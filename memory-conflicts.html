<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascend 内存复用分析 · Memory Reuse Viewer</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#30363d;
    --txt:#e6edf3; --txt-dim:#8b949e; --accent:#58a6ff; --accent2:#3fb950;
    --warn:#f0883e; --peak:#ff5d5d; --grid:#21262d; --hi:#f7c16b;
    --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;}
  #app{display:grid;grid-template-columns:1fr 380px;grid-template-rows:auto 1fr;height:100vh;}
  #app.src-open{grid-template-columns:1fr 340px 480px;}
  header{grid-column:1/-1;display:flex;align-items:center;gap:18px;
    padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px;}
  header .sub{color:var(--txt-dim);font-size:12px;}
  header .spacer{flex:1}
  .pill{font-family:var(--mono);font-size:12px;background:var(--panel2);
    border:1px solid var(--line);border-radius:6px;padding:4px 10px;color:var(--txt-dim);}
  .pill b{color:var(--txt)}
  .pill.peak b{color:var(--peak)}
  .ctrl{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--txt-dim)}
  select,button,input[type=text]{background:var(--panel2);color:var(--txt);
    border:1px solid var(--line);border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit;}
  button{cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.active{border-color:var(--accent);color:var(--accent)}

  #stageWrap{grid-column:1/2;grid-row:2/3;position:relative;overflow:hidden;background:
    radial-gradient(1200px 600px at 30% -10%,#11161f,transparent),var(--bg);}
  #stage{position:absolute;inset:0;}
  canvas{position:absolute;top:0;left:0}
  #tip{position:absolute;pointer-events:none;z-index:20;display:none;max-width:300px;
    background:rgba(20,26,34,.97);border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-size:12px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  #tip .n{font-weight:600;color:var(--hi)}
  #tip .row{color:var(--txt-dim)}
  #tip .row b{color:var(--txt);font-family:var(--mono)}

  /* side panel */
  aside{grid-column:2/3;grid-row:2/3;background:var(--panel);border-left:1px solid var(--line);
    overflow:auto;display:flex;flex-direction:column;}
  .sect{border-bottom:1px solid var(--line);padding:12px 14px;}
  .sect h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--txt-dim);margin:0 0 8px;}
  .kv{display:grid;grid-template-columns:90px 1fr;gap:4px 8px;font-size:12px;}
  .kv .k{color:var(--txt-dim)}
  .kv .v{font-family:var(--mono);color:var(--txt);word-break:break-all}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
  pre.code{background:#0a0e14;border:1px solid var(--line);border-radius:6px;
    padding:10px;font-family:var(--mono);font-size:11.5px;line-height:1.55;
    overflow:auto;max-height:200px;margin:0;color:#c9d1d9;white-space:pre}
  pre.code .ln{color:#484f58;user-select:none;display:inline-block;width:28px;text-align:right;margin-right:10px}
  pre.code .hot{background:rgba(247,193,107,.12);display:block;margin:0 -10px;padding:0 10px}
  .cce{font-family:var(--mono);font-size:11.5px;line-height:1.7;color:#c9d1d9}
  .cce .op{color:var(--accent)}
  .cce .cm{color:#6e7681}
  .empty{color:var(--txt-dim);font-size:12px;font-style:italic}
  .legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--txt-dim)}
  .legend span{display:flex;align-items:center}
  .reuse-tag{display:inline-block;background:rgba(63,185,80,.15);color:var(--accent2);
    border:1px solid rgba(63,185,80,.4);border-radius:4px;padding:1px 6px;font-size:11px;margin:2px 2px 0 0;font-family:var(--mono)}
  .hint{font-size:11px;color:var(--txt-dim);margin-top:6px;line-height:1.5}
  .filterbox{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .toggle{font-size:11px;padding:3px 8px}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:5px}

  /* clickable source-file link in detail panel */
  .srclink{display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    background:var(--panel2);border:1px solid var(--line);border-radius:6px;
    padding:5px 9px;font-family:var(--mono);font-size:12px;color:var(--accent);}
  .srclink:hover{border-color:var(--accent);background:#10243b}
  .srclink svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

  /* IDE source-file panel (3rd column) */
  #srcPanel{grid-column:3/4;grid-row:2/3;background:#0a0e14;border-left:1px solid var(--line);
    display:none;flex-direction:column;min-width:0;overflow:hidden;}
  #app.src-open #srcPanel{display:flex;}
  .src-tabs{display:flex;align-items:center;background:var(--panel);border-bottom:1px solid var(--line);
    height:36px;flex:0 0 auto;padding-left:4px;}
  .src-tab{display:flex;align-items:center;gap:8px;height:100%;padding:0 12px;font-size:12px;
    color:var(--txt);border-right:1px solid var(--line);background:#0a0e14;font-family:var(--mono);}
  .src-tab .dot{width:7px;height:7px;border-radius:50%;background:var(--accent2)}
  .src-tabs .close{margin-left:auto;margin-right:8px;cursor:pointer;color:var(--txt-dim);
    font-size:16px;line-height:1;padding:4px 8px;border-radius:5px}
  .src-tabs .close:hover{background:var(--panel2);color:var(--txt)}
  .src-toolbar{display:flex;align-items:center;gap:10px;height:30px;flex:0 0 auto;
    padding:0 12px;background:#0c1119;border-bottom:1px solid var(--line);
    font-size:11px;color:var(--txt-dim);font-family:var(--mono)}
  .src-toolbar b{color:var(--hi)}
  .src-toolbar .nav{margin-left:auto;display:flex;gap:6px}
  .src-toolbar .nav button{padding:2px 8px;font-size:11px}
  #srcScroll{flex:1;overflow:auto;}
  .src-code{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre;
    counter-reset:none;padding:6px 0 40vh 0;}
  .src-line{display:flex;cursor:pointer;}
  .src-line:hover{background:#11161f}
  .src-line .gut{flex:0 0 46px;text-align:right;padding:0 10px 0 0;color:#3a414b;
    user-select:none;border-right:1px solid #161b22;}
  .src-line .ln-txt{padding:0 12px;color:#c9d1d9;flex:1;min-width:0}
  /* belongs to currently-selected tensor */
  .src-line.range{background:rgba(88,166,255,.07)}
  .src-line.range .gut{color:#6aa6e0;border-left:2px solid var(--accent);margin-left:-2px}
  .src-line.hot{background:rgba(247,193,107,.16)!important}
  .src-line.hot .gut{color:var(--hi)}
  /* a line that maps to ANY tensor -> clickable affordance */
  .src-line.mapped .ln-txt{position:relative}
  .src-line.mapped:hover .ln-txt{background:rgba(63,185,80,.06)}
  .src-line .tag{float:right;font-size:10px;color:#3fb95099;margin-left:8px;font-family:var(--mono)}
  /* syntax-ish coloring */
  .src-code .c{color:#6e7681}
  .src-code .k{color:#ff7b72}
  .src-code .t{color:#79c0ff}
  .src-code .f{color:#d2a8ff}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Ascend 内存复用分析器</h1>
    <span class="sub" id="kernelName">—</span>
    <div class="ctrl">
      <label>Buffer
        <select id="bufSel"></select>
      </label>
    </div>
    <button id="btnPeak" class="active">峰值曲线</button>
    <button id="btnGrid" class="active">网格</button>
    <button id="btnReset">重置视图</button>
    <div class="spacer"></div>
    <span class="pill">容量 <b id="capLbl">—</b></span>
    <span class="pill peak">峰值 <b id="peakLbl">—</b></span>
    <span class="pill">利用率 <b id="utilLbl">—</b></span>
    <span class="pill">Tensors <b id="cntLbl">—</b></span>
  </header>

  <div id="stageWrap">
    <div id="stage">
      <canvas id="cv"></canvas>
    </div>
    <div id="tip"></div>
  </div>

  <aside>
    <div class="sect">
      <h2>视图说明</h2>
      <div class="hint">
        横轴 = Buffer 地址空间（offset → 容量）。纵轴 = Kernel 指令生命周期（自顶向下）。
        每个矩形是一个 Tensor：<b>宽=占用大小</b>，<b>高=存活区间</b>。
        同一地址列上下相邻的两块 = <b>内存复用</b>。点击矩形查看详情，再点「源文件」可像 IDE 打开完整代码并双向联动。
      </div>
      <div class="legend" style="margin-top:8px">
        <span><i class="swatch" style="background:#ff5d5d"></i>峰值线</span>
        <span><i class="swatch" style="background:#58a6ff"></i>常驻</span>
        <span><i class="swatch" style="background:#3fb950"></i>临时</span>
        <span><i class="swatch" style="background:#f0883e"></i>跨循环</span>
      </div>
      <div class="filterbox">
        <button class="toggle active" data-kind="all">全部</button>
        <button class="toggle" data-kind="resident">常驻</button>
        <button class="toggle" data-kind="temp">临时</button>
        <button class="toggle" data-kind="reused">仅复用</button>
      </div>
    </div>

    <div class="sect" id="detailSect">
      <h2>Tensor 详情</h2>
      <div id="detail"><div class="empty">点击左侧任一 Tensor 查看详情…</div></div>
    </div>

    <div class="sect" id="codeSect" style="flex:1">
      <h2>源码 / CCE 指令</h2>
      <div id="codeBody"><div class="empty">选择一个 Tensor 以关联其源代码与 CCE 指令。</div></div>
    </div>
  </aside>

  <section id="srcPanel">
    <div class="src-tabs">
      <div class="src-tab"><span class="dot"></span><span id="srcTabName">—</span></div>
      <div class="close" id="srcClose" title="关闭">×</div>
    </div>
    <div class="src-toolbar">
      <span id="srcStatus">—</span>
      <div class="nav">
        <button id="srcPrev" title="上一个 Tensor 段">▲</button>
        <button id="srcNext" title="下一个 Tensor 段">▼</button>
      </div>
    </div>
    <div id="srcScroll"><div class="src-code" id="srcCode"></div></div>
  </section>
</div>

<!--
  数据格式（把你的 Memory.txt 解析后填到下面 #MEMDATA 的 JSON 中即可）
  buffers[]: 一个 kernel 用到的物理 Buffer（UB/L1/L0A/L0B/L0C…） name, capacity(bytes)
  ticks:     指令时间轴总长度（指令条数 / cycle 数）
  tensors[]: 每个 tile 产出的 Tensor 全生命周期
    id, name, buffer, offset(bytes), size(bytes), allocTick, freeTick (存活区间 [alloc,free)),
    kind: resident|temp|loop (着色分类), reuseOf (复用了哪个 tensor 的地址,可空), reusedBy[] (地址随后被谁复用),
    srcFile, srcLineStart, srcLineEnd, srcHotLine, code (源码片段), cce (CCE 指令片段)
-->
<script id="MEMDATA" type="application/json">
{
  "kernel": "MatMulAddRelu_mix_aic__kernel0",
  "ticks": 120,
  "buffers": [
    {"name":"UB",  "capacity":290816},
    {"name":"L1",  "capacity":524288},
    {"name":"L0C", "capacity":131072}
  ],
  "sourceFiles": {
    "matmul_add_relu.cce": "// =====================================================================\n//  matmul_add_relu.cce\n//  Fused kernel:  Y = ReLU( X @ W + bias )   (fp16 in / fp16 out)\n//  Target: Ascend AI Core (Cube + Vector), mix aic/aiv pipeline\n// =====================================================================\n#include \"kernel_operator.h\"\nusing namespace AscendC;\n\nconstexpr int M = 256, K = 512, N = 256;\nconstexpr int TILE_M = 128, TILE_N = 128, TILE_K = 256;\n\nclass KernelMatMulAddRelu {\npublic:\n    __aicore__ inline KernelMatMulAddRelu() {}\n\n    __aicore__ inline void Init(GM_ADDR x, GM_ADDR w, GM_ADDR bias, GM_ADDR y) {\n        xGm.SetGlobalBuffer((__gm__ half*)x);\n        wGm.SetGlobalBuffer((__gm__ half*)w);\n        biasGm.SetGlobalBuffer((__gm__ float*)bias);\n        yGm.SetGlobalBuffer((__gm__ half*)y);\n        pipe.InitBuffer(inQueueX, 1, TILE_M * TILE_K * sizeof(half));\n        pipe.InitBuffer(inQueueW, 1, TILE_K * TILE_N * sizeof(half));\n        pipe.InitBuffer(l1Buf,    1, TILE_K * TILE_N * sizeof(half));\n    }\n\n    __aicore__ inline void Process() {\n        // -------- stage operands into L1 (reused across loops) --------\n\n            // --- stage weight tile: GM -> L1 (wL1_stage) ---\n            LocalTensor<half> wL1 = l1Buf.AllocTensor<half>();\n            // DMA copy weights into L1 scratch\n            DataCopy(wL1, wGm[wOff], {nBlk, blockLen, 0, 0});   // hot\n            l1Buf.EnQue(wL1);\n            wL1 = l1Buf.DeQue<half>();\n\n            // --- stage next activation into SAME L1 region (aL1_stage) ---\n            DataCopy(aL1, aGm[aOff], {1, blockLen, 0, 0});      // hot\n            l1Buf.EnQue(aL1);\n\n            // ---- load activation tile from GM -> UB (xGm_in) ----\n            LocalTensor<half> xUb = inQueueX.AllocTensor<half>();\n            DataCopy(xUb, xGm[offset], {1, blockLen, 0, 0});\n            inQueueX.EnQue(xUb);                                // hot\n            xUb = inQueueX.DeQue<half>();\n            SetFlag<HardEvent::MTE2_M>(EVENT_ID0);\n            WaitFlag<HardEvent::MTE2_M>(EVENT_ID0);\n\n            // ---- load weight tile GM -> UB (wGm_in) ----\n            LocalTensor<half> wUb = inQueueW.AllocTensor<half>();\n            DataCopy(wUb, wGm[woff], {nBlk, blockLen, 0, 0});   // hot\n            inQueueW.EnQue(wUb);\n            wUb = inQueueW.DeQue<half>();\n\n            // ---- MMAD: accumulate X @ W into L0C (cMatrix) ----\n            MmadParams mmadParams{TILE_M, TILE_K, TILE_N, true};\n            Mmad(cMatrix, xUb, wUb, mmadParams);                // hot\n            inQueueX.FreeTensor(xUb);\n            inQueueW.FreeTensor(wUb);\n\n            // ---- load bias vector into UB (biasUb) ----\n            LocalTensor<float> biasUb = biasBuf.Get<float>();   // hot\n            DataCopy(biasUb, biasGm[nOff], n);\n            PipeBarrier<PIPE_V>();\n\n            // ======== epilogue: bias add + ReLU on Vector unit ========\n            // ---- copy L0C -> UB, then vector Add bias (cUb_fp32) ----\n            LocalTensor<float> cUb = ubBuf.Get<float>();\n            DataCopy(cUb, cMatrix, {TILE_M, TILE_N, 0, 0});     // hot\n            WaitFlag<HardEvent::M_V>(EVENT_ID0);\n            Add(cUb, cUb, biasUb, mask);\n\n            // ---- in-place ReLU (reuses weight region, reluUb) ----\n            Relu(reluUb, cUb);                                  // hot\n            // NOTE: reluUb address reuses wGm_in (freed at tick #58)\n            PipeBarrier<PIPE_V>();\n\n            // ---- cast fp32 -> fp16 and store to GM (yUb_out) ----\n            LocalTensor<half> yUb = outBuf.Get<half>();\n            // yUb_out address reuses xGm_in region\n            Cast(yUb, reluUb, RoundMode::CAST_RINT, len);       // hot\n            DataCopy(yGm[offset], yUb, {1, blockLen, 0, 0});\n            outBuf.FreeTensor(yUb);\n\n            // ---- per-loop scratch scaling (scratchUb, reuses cUb) ----\n            for (int i = 0; i < nLoop; ++i) {                   // hot\n                Muls(scratch, yUb, scaleArr[i]);\n            }\n        }   // end for mb\n    }\n\nprivate:\n    TPipe pipe;\n    TQue<QuePosition::VECIN, 1> inQueueX, inQueueW;\n    GlobalTensor<half> xGm, wGm, yGm;\n    GlobalTensor<float> biasGm;\n};"
  },
  "tensors": [
    {"id":"t1","name":"xGm_in","buffer":"UB","offset":0,"size":65536,"allocTick":2,"freeTick":40,"kind":"resident","reuseOf":null,"reusedBy":["t7"],
     "srcFile":"matmul_add_relu.cce","srcLineStart":40,"srcLineEnd":46,"srcHotLine":43,
     "code":"// load activation tile from GM\nLocalTensor<half> xUb = inQueueX.AllocTensor<half>();\nDataCopy(xUb, xGm[offset], {1, blockLen, 0, 0});\ninQueueX.EnQue(xUb);\nxUb = inQueueX.DeQue<half>();   // hot\nMmad(cMatrix, xUb, wUb, mmadParams);",
     "cce":"// xGm_in  @UB+0x00000  64KB\nLD.global.b128  %ub0, [%gm_x+0]\nLD.global.b128  %ub0+16,[%gm_x+16]\nWAIT_FLAG MTE2->M\nMMAD %l0c0, %ub0, %ub_w"},

    {"id":"t2","name":"wGm_in","buffer":"UB","offset":65536,"size":98304,"allocTick":3,"freeTick":58,"kind":"resident","reuseOf":null,"reusedBy":["t6"],
     "srcFile":"matmul_add_relu.cce","srcLineStart":48,"srcLineEnd":52,"srcHotLine":50,
     "code":"// load weight tile\nLocalTensor<half> wUb = inQueueW.AllocTensor<half>();\nDataCopy(wUb, wGm[woff], {nBlk, blockLen, 0, 0});\ninQueueW.EnQue(wUb);\nwUb = inQueueW.DeQue<half>();   // hot",
     "cce":"// wGm_in  @UB+0x10000  96KB\nLD.global.b128 %ub_w,[%gm_w+0]\nWAIT_FLAG MTE2->M"},

    {"id":"t3","name":"cMatrix","buffer":"L0C","offset":0,"size":131072,"allocTick":6,"freeTick":74,"kind":"resident","reuseOf":null,"reusedBy":[],
     "srcFile":"matmul_add_relu.cce","srcLineStart":54,"srcLineEnd":58,"srcHotLine":56,
     "code":"// MMAD accumulate into L0C\nMmad(cMatrix, xUb, wUb, {M,K,N, true});  // hot\n// cMatrix holds fp32 partial sums",
     "cce":"// cMatrix @L0C+0x0  128KB\nMMAD %l0c0,%ub0,%ub_w,init=1\nMMAD %l0c0,%ub1,%ub_w1,init=0"},

    {"id":"t4","name":"biasUb","buffer":"UB","offset":163840,"size":16384,"allocTick":10,"freeTick":30,"kind":"temp","reuseOf":null,"reusedBy":[],

    {"id":"t5","name":"cUb_fp32","buffer":"UB","offset":180224,"size":65536,"allocTick":62,"freeTick":92,"kind":"temp","reuseOf":null,"reusedBy":["t8"],

     "cce":"// cUb_fp32 @UB+0x2c000 64KB\nWAIT_FLAG M->V\nDataCopy %ub_c,%l0c0\nVADD %ub_c,%ub_c,%ub_b"},

    {"id":"t6","name":"reluUb","buffer":"UB","offset":65536,"size":65536,"allocTick":78,"freeTick":104,"kind":"temp","reuseOf":"t2","reusedBy":[],
     "srcFile":"matmul_add_relu.cce","srcLineStart":72,"srcLineEnd":75,"srcHotLine":73,
     "code":"// in-place ReLU (reuses weight region, freed at #58)\nRelu(reluUb, cUb);                 // hot\n// addr reused from wGm_in (t2)",
     "cce":"// reluUb @UB+0x10000 64KB  (reuse of wGm_in)\nVMAX %ub_r,%ub_c,#0"},

     "srcFile":"matmul_add_relu.cce","srcLineStart":78,"srcLineEnd":82,"srcHotLine":80,
     "code":"// cast fp32->half, store to GM (reuses xGm_in region)\nCast(yUb, reluUb, RoundMode::CAST_RINT);  // hot\nDataCopy(yGm[offset], yUb, {…});",
     "cce":"// yUb_out @UB+0x0 64KB (reuse of xGm_in)\nVCONV %ub_y,%ub_r,f32->f16\nST.global.b128 [%gm_y],%ub_y"},

    {"id":"t8","name":"scratchUb","buffer":"UB","offset":180224,"size":32768,"allocTick":96,"freeTick":112,"kind":"loop","reuseOf":"t5","reusedBy":[],
     "srcFile":"matmul_add_relu.cce","srcLineStart":84,"srcLineEnd":87,"srcHotLine":85,

     "cce":"// scratchUb @UB+0x2c000 32KB (reuse cUb)\nLOOP i\n  VMULS %ub_s,%ub_y,%scale\nENDLOOP"},

    {"id":"t9","name":"wL1_stage","buffer":"L1","offset":0,"size":262144,"allocTick":1,"freeTick":60,"kind":"resident","reuseOf":null,"reusedBy":["t10"],

     "cce":"// wL1_stage @L1+0x0 256KB\nLD.global %l1_w,[%gm_w]"},

    {"id":"t10","name":"aL1_stage","buffer":"L1","offset":0,"size":262144,"allocTick":64,"freeTick":110,"kind":"loop","reuseOf":"t9","reusedBy":[],
     "srcFile":"matmul_add_relu.cce","srcLineStart":36,"srcLineEnd":38,"srcHotLine":37,
     "code":"// stage next activation into same L1 region\nDataCopy(aL1, aGm, {…});          // hot",
     "cce":"// aL1_stage @L1+0x0 256KB (reuse wL1_stage)\nLD.global %l1_a,[%gm_a]"}
  ]
}
</script>

<script>
const DATA = JSON.parse(document.getElementById('MEMDATA').textContent);
document.getElementById('kernelName').textContent = '· ' + DATA.kernel;

const KIND_COLOR = {resident:'#58a6ff', temp:'#3fb950', loop:'#f0883e'};
const fmtKB = b => (b/1024)%1===0 ? (b/1024)+'KB' : (b/1024).toFixed(1)+'KB';
const fmtHex = b => '0x'+b.toString(16).toUpperCase().padStart(5,'0');

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stageWrap = document.getElementById('stageWrap');
const tip = document.getElementById('tip');

let state = {
  buffer: DATA.buffers[0].name,
  showPeak: true, showGrid: true,
  filter: 'all',
  selected: null, hover: null,
  // viewport transform
  ox: 0, oy: 0, scale: 1
};

// layout margins (in screen px, fixed)
const M = {left:64, right:120, top:58, bottom:20};

function currentBuffer(){ return DATA.buffers.find(b=>b.name===state.buffer); }
function bufferTensors(){
  return DATA.tensors.filter(t=>t.buffer===state.buffer);
}
function visibleTensors(){
  let ts = bufferTensors();
  if(state.filter==='resident') ts=ts.filter(t=>t.kind==='resident');
  else if(state.filter==='temp') ts=ts.filter(t=>t.kind!=='resident');
  else if(state.filter==='reused') ts=ts.filter(t=>t.reuseOf||(t.reusedBy&&t.reusedBy.length));
  return ts;
}

// ---- peak memory curve: bytes used per tick ----
function computePeak(){
  const ts = bufferTensors();
  const usage = new Array(DATA.ticks+1).fill(0);
  for(const t of ts){
    for(let k=t.allocTick;k<t.freeTick;k++) usage[k]+=t.size;
  }
  let peak=0, peakTick=0;
  usage.forEach((u,i)=>{ if(u>peak){peak=u;peakTick=i;} });
  return {usage, peak, peakTick};
}

// ---- coordinate mapping ----
// data X: 0..capacity (bytes) -> plot X
// data Y: 0..ticks            -> plot Y
function plotRect(){
  return {
    x: M.left, y: M.top,
    w: cv.clientWidth - M.left - M.right,
    h: cv.clientHeight - M.top - M.bottom
  };
}
function xOf(bytes){
  const p=plotRect(), cap=currentBuffer().capacity;
  return p.x + (bytes/cap)*p.w*state.scale + state.ox;
}
function yOf(tick){
  const p=plotRect();
  return p.y + (tick/DATA.ticks)*p.h*state.scale + state.oy;
}
function invX(px){
  const p=plotRect(), cap=currentBuffer().capacity;
  return ((px - p.x - state.ox)/(p.w*state.scale))*cap;
}
function invY(py){
  const p=plotRect();
  return ((py - p.y - state.oy)/(p.h*state.scale))*DATA.ticks;
}

let rects=[]; // hit-test cache

function resize(){
  const r=stageWrap.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr;
  cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}

function draw(){
  const W=cv.clientWidth, H=cv.clientHeight, p=plotRect(), cap=currentBuffer().capacity;
  ctx.clearRect(0,0,W,H);

  // plot background
  ctx.fillStyle='#0a0e14';
  ctx.fillRect(p.x,p.y,p.w,p.h);

  // ---- grid (Y only here; X handled by ruler below) ----
  if(state.showGrid){
    ctx.strokeStyle='#1b2129'; ctx.lineWidth=1; ctx.fillStyle='#6e7681';
    ctx.font='10px '+getComputedStyle(document.body).fontFamily;
    // light vertical guides aligned to ruler's major step
    const guideStep = rulerMajorStep(p, cap);
    for(let b=0;b<=cap;b+=guideStep){
      const x=xOf(b);
      if(x<p.x-1||x>p.x+p.w+1) continue;
      ctx.beginPath();ctx.moveTo(x,p.y);ctx.lineTo(x,p.y+p.h);ctx.stroke();
    }
    // Y grid: ticks (every 20)
    const stepY=20;
    ctx.textAlign='right';ctx.textBaseline='middle';
    for(let t=0;t<=DATA.ticks;t+=stepY){
      const y=yOf(t);
      if(y<p.y-1||y>p.y+p.h+1) continue;
      ctx.beginPath();ctx.moveTo(p.x,y);ctx.lineTo(p.x+p.w,y);ctx.stroke();
      ctx.fillText('#'+t, p.x-6, y);
    }
  }

  // ---- X address ruler drawn after masks (see below) ----

  // axis title (Y only; X is the top ruler)
  ctx.fillStyle='#8b949e';ctx.font='11px sans-serif';
  ctx.save();ctx.translate(14,p.y+p.h/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.fillText('指令生命周期 (tick) ↓',0,0);ctx.restore();

  // ---- capacity ceiling (right edge of usable space) ----
  const capX=xOf(cap);
  ctx.strokeStyle='#3d444d';ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(capX,p.y);ctx.lineTo(capX,p.y+p.h);ctx.stroke();
  ctx.setLineDash([]);

  // ---- tensors ----
  rects=[];
  const vis=new Set(visibleTensors().map(t=>t.id));
  const allBuf=bufferTensors();
  ctx.font='11px sans-serif';
  for(const t of allBuf){
    const x=xOf(t.offset), x2=xOf(t.offset+t.size);
    const y=yOf(t.allocTick), y2=yOf(t.freeTick);
    const rw=x2-x, rh=y2-y;
    const dim = !vis.has(t.id);
    const sel = state.selected===t.id;
    const hov = state.hover===t.id;
    const col = KIND_COLOR[t.kind]||'#888';

    ctx.globalAlpha = dim?0.12:(sel?1:0.82);
    // fill
    ctx.fillStyle=col;
    roundRect(x+1,y+1,Math.max(rw-2,1),Math.max(rh-2,1),3);
    ctx.fill();
    // reuse hatch: if this tensor reuses another, draw diagonal stripe at its top edge
    if(t.reuseOf && !dim){
      ctx.save();ctx.globalAlpha=0.9;ctx.strokeStyle='#0a0e14';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x+1,y+1);ctx.lineTo(x+Math.min(rw,14),y+1);ctx.stroke();
      ctx.restore();
    }
    // border
    ctx.globalAlpha = dim?0.15:1;
    ctx.lineWidth = sel?2.5:(hov?2:1);
    ctx.strokeStyle = sel?'#f7c16b':(hov?'#fff':'#0a0e14');
    roundRect(x+1,y+1,Math.max(rw-2,1),Math.max(rh-2,1),3);
    ctx.stroke();

    // flash pulse (when jumped to from source panel)
    if(flashId===t.id){
      const dt=performance.now()-flashT;
      const k=Math.max(0,1-dt/700);
      ctx.save();
      ctx.globalAlpha=k;
      ctx.lineWidth=2+6*k;
      ctx.strokeStyle='#f7c16b';
      roundRect(x+1-3*k,y+1-3*k,Math.max(rw-2+6*k,1),Math.max(rh-2+6*k,1),5);
      ctx.stroke();
      ctx.restore();
    }

    if(rw>46 && rh>16 && !dim){
      ctx.globalAlpha=1;ctx.fillStyle='#0a0e14';
      ctx.textAlign='left';ctx.textBaseline='top';
      const lbl=t.name.length*6.5>rw-8 ? t.name.slice(0,Math.max(1,Math.floor((rw-8)/6.5)))+'…' : t.name;
      ctx.fillText(lbl, x+6, y+5);
      if(rh>30){ctx.globalAlpha=.7;ctx.fillText(fmtKB(t.size), x+6, y+19);}
    }
    rects.push({t,x,y,w:rw,h:rh});
  }
  ctx.globalAlpha=1;

  // ---- peak curve (drawn along X = usage, i.e. a vertical profile on right) ----
  // We render usage as a curve where horizontal extent = bytes used at each tick.
  if(state.showPeak){
    const {usage,peak,peakTick}=computePeak();
    ctx.strokeStyle='var(--peak)';
    ctx.strokeStyle='#ff5d5d';ctx.lineWidth=1.5;ctx.globalAlpha=.9;
    ctx.beginPath();
    let started=false;
    for(let k=0;k<=DATA.ticks;k++){
      const x=xOf(usage[k]); const y=yOf(k);
      if(!started){ctx.moveTo(x,y);started=true;} else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // peak marker
    const pk_x=xOf(peak), pk_y=yOf(peakTick);
    ctx.globalAlpha=1;ctx.fillStyle='#ff5d5d';
    ctx.beginPath();ctx.arc(pk_x,pk_y,4,0,7);ctx.fill();
    ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText('peak '+fmtKB(peak), pk_x+6, pk_y-2);
    ctx.globalAlpha=1;
  }

  // clip overflow with side masks
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,p.x,H); ctx.fillRect(p.x+p.w,0,W,H);
  ctx.fillRect(0,0,W,p.y); ctx.fillRect(0,p.y+p.h,W,H);

  // ---- X address ruler (像刻度尺) — drawn on top of the bottom mask ----
  drawRuler(p, cap);

  updateStats();
}

function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

// 选择"nice"主步长，保证相邻主刻度屏幕间距 >= ~64px
function rulerMajorStep(p, cap){
  const niceSteps = [4,8,16,32,64,128,256,512,1024].map(k=>k*1024); // 4KB..1MB
  const pxPerByte = (p.w*state.scale)/cap;
  return niceSteps.find(s => s*pxPerByte >= 64) || niceSteps[niceSteps.length-1];
}

// 地址刻度尺（置于绘图区顶部）：根据缩放自适应步长，主刻度标 KB+hex，次刻度只画短线
function drawRuler(p, cap){
  const baseY = p.y;                 // ruler baseline = TOP of plot
  const majorStep = rulerMajorStep(p, cap);
  const minorStep = majorStep/4;     // 每个主格分 4 小格

  // baseline
  ctx.strokeStyle='#3d444d'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(p.x,baseY-0.5);ctx.lineTo(p.x+p.w,baseY-0.5);ctx.stroke();

  // minor ticks (向上)
  ctx.strokeStyle='#2b333d'; ctx.beginPath();
  for(let b=0;b<=cap+1;b+=minorStep){
    const x=xOf(b);
    if(x<p.x-1||x>p.x+p.w+1) continue;
    ctx.moveTo(x,baseY);ctx.lineTo(x,baseY-4);
  }
  ctx.stroke();

  // major ticks + labels（向上）
  ctx.font='10px '+getComputedStyle(document.body).fontFamily;
  for(let b=0;b<=cap+1;b+=majorStep){
    const bb=Math.min(b,cap);          // clamp last label to capacity
    const x=xOf(bb);
    if(x<p.x-1||x>p.x+p.w+1) continue;
    // major tick mark
    ctx.strokeStyle='#54606b';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x,baseY-7);ctx.stroke();
    // labels: KB (上) + hex offset (下，靠近基线)
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='#5b646e';
    ctx.fillText(fmtHex(bb), x, baseY-9);
    ctx.fillStyle='#b9c2cc';
    ctx.fillText(fmtKB(bb), x, baseY-21);
  }

  // capacity end cap label (red) if not aligned to a major tick
  if(cap % majorStep !== 0){
    const x=xOf(cap);
    if(x>=p.x-1 && x<=p.x+p.w+1){
      ctx.strokeStyle='#ff5d5d';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x,baseY-7);ctx.stroke();
      ctx.fillStyle='#ff7b7b';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(fmtKB(cap), x, baseY-21);
    }
  }

  // 地址轴说明（左上角）
  ctx.fillStyle='#8b949e';ctx.font='11px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='bottom';
  ctx.fillText('地址 / Buffer offset →', p.x, baseY-34);
}

function updateStats(){
  const buf=currentBuffer();
  const {peak}=computePeak();
  document.getElementById('capLbl').textContent=fmtKB(buf.capacity);
  document.getElementById('peakLbl').textContent=fmtKB(peak);
  document.getElementById('utilLbl').textContent=(peak/buf.capacity*100).toFixed(1)+'%';
  document.getElementById('cntLbl').textContent=bufferTensors().length;
}

// ---- interaction ----
function hitTest(mx,my){
  for(let i=rects.length-1;i>=0;i--){
    const r=rects[i];
    if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h) return r.t;
  }
  return null;
}
stageWrap.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const t=hitTest(mx,my);
  state.hover = t?t.id:null;
  if(t){
    tip.style.display='block';
    tip.style.left=Math.min(mx+14, rect.width-310)+'px';
    tip.style.top=(my+14)+'px';
    const reuse = t.reuseOf? `<div class="row">复用自 <b>${nameOf(t.reuseOf)}</b></div>`:'';
    const reused = (t.reusedBy&&t.reusedBy.length)? `<div class="row">被复用 → <b>${t.reusedBy.map(nameOf).join(', ')}</b></div>`:'';
    tip.innerHTML=`<div class="n">${t.name}</div>
      <div class="row">地址 <b>${fmtHex(t.offset)}–${fmtHex(t.offset+t.size)}</b></div>
      <div class="row">大小 <b>${fmtKB(t.size)}</b> · 区间 <b>#${t.allocTick}–#${t.freeTick}</b></div>
      ${reuse}${reused}`;
  } else tip.style.display='none';
  draw();
});
stageWrap.addEventListener('mouseleave',()=>{state.hover=null;tip.style.display='none';draw();});
stageWrap.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const t=hitTest(e.clientX-rect.left,e.clientY-rect.top);
  state.selected = t?t.id:null;
  renderDetail(t); draw();
});

// pan + zoom
let drag=null;
stageWrap.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,ox:state.ox,oy:state.oy,moved:false};});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  state.ox=drag.ox+(e.clientX-drag.x);
  state.oy=drag.oy+(e.clientY-drag.y);
  drag.moved=true; draw();
});
window.addEventListener('mouseup',()=>{drag=null;});
stageWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const f=e.deltaY<0?1.12:1/1.12;
  // zoom toward cursor
  state.ox = mx - (mx-state.ox)*f;
  state.oy = my - (my-state.oy)*f;
  state.scale*=f;
  state.scale=Math.max(0.4,Math.min(state.scale,12));
  draw();
},{passive:false});

function nameOf(id){const t=DATA.tensors.find(x=>x.id===id);return t?t.name:id;}

function renderDetail(t){
  const d=document.getElementById('detail');
  const c=document.getElementById('codeBody');
  if(!t){
    d.innerHTML='<div class="empty">点击左侧任一 Tensor 查看详情…</div>';
    c.innerHTML='<div class="empty">选择一个 Tensor 以关联其源代码与 CCE 指令。</div>';
    return;
  }
  const reuseTags=[];
  if(t.reuseOf) reuseTags.push(`<span class="reuse-tag">↥ 复用自 ${nameOf(t.reuseOf)}</span>`);
  (t.reusedBy||[]).forEach(r=>reuseTags.push(`<span class="reuse-tag">↧ 被 ${nameOf(r)} 复用</span>`));
  const life=t.freeTick-t.allocTick;
  d.innerHTML=`
    <div class="kv">
      <div class="k"><span class="swatch" style="background:${KIND_COLOR[t.kind]}"></span>名称</div><div class="v">${t.name}</div>
      <div class="k">Buffer</div><div class="v">${t.buffer}</div>
      <div class="k">地址区间</div><div class="v">${fmtHex(t.offset)} – ${fmtHex(t.offset+t.size)}</div>
      <div class="k">占用大小</div><div class="v">${fmtKB(t.size)} (${t.size} B)</div>
      <div class="k">存活区间</div><div class="v">#${t.allocTick} → #${t.freeTick}　(${life} ticks)</div>
      <div class="k">分类</div><div class="v">${t.kind}</div>
      <div class="k">源文件</div><div class="v"><span class="srclink" id="openSrc">
        <svg viewBox="0 0 24 24"><path d="M4 4h10l6 6v10a0 0 0 0 1 0 0H4z"/><path d="M14 4v6h6"/></svg>
        ${t.srcFile}:${t.srcLineStart}-${t.srcLineEnd}</span></div>
    </div>
    ${reuseTags.length?`<div style="margin-top:8px">${reuseTags.join('')}</div>`:''}
    <div class="hint" style="margin-top:8px">点击源文件可在右侧像 IDE 一样打开完整代码并跳转高亮。</div>`;

  const openBtn=document.getElementById('openSrc');
  if(openBtn) openBtn.onclick=()=>openSourcePanel(t);

  // 若源码面板已打开，切换 Tensor 时自动联动
  if(document.getElementById('app').classList.contains('src-open')){
    openSourcePanel(t);
  }

  // code with hot line highlight + line numbers
  const lines=(t.code||'').split('\n');
  let codeHtml='';
  lines.forEach((ln,i)=>{
    const lineNo=(t.srcLineStart||1)+i;
    const isHot=lineNo===t.srcHotLine || /hot/.test(ln);
    const esc=ln.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    codeHtml+=`<span class="${isHot?'hot':''}"><span class="ln">${lineNo}</span>${esc}</span>\n`;
  });
  // cce coloring
  const cce=(t.cce||'').split('\n').map(l=>{
    let e=l.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(e.trim().startsWith('//')) return `<span class="cm">${e}</span>`;
    return e.replace(/^(\s*)([A-Z_][A-Z0-9_.]+)/,(m,sp,op)=>`${sp}<span class="op">${op}</span>`);
  }).join('\n');

  c.innerHTML=`
    <div style="font-size:11px;color:#8b949e;margin-bottom:4px">源码 · ${t.srcFile}</div>
    <pre class="code">${codeHtml}</pre>
    <div style="font-size:11px;color:#8b949e;margin:10px 0 4px">CCE 指令</div>
    <pre class="code cce">${cce}</pre>`;
}

// ================= IDE 源码文件面板 =================
const appEl=document.getElementById('app');
let srcState={file:null, lineToTensor:{}, ranges:[]};

// 简易语法着色（注释/关键字/类型/函数名）
function hl(line){
  let e=line.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  // 整行注释
  if(/^\s*\/\//.test(e)) return `<span class="c">${e}</span>`;
  // 行尾注释
  e=e.replace(/(\/\/[^]*)$/,'<span class="c">$1</span>');
  e=e.replace(/\b(for|if|else|return|using|namespace|constexpr|class|public|private|inline|int|void)\b/g,'<span class="k">$1</span>');
  e=e.replace(/\b(LocalTensor|GlobalTensor|GM_ADDR|TPipe|TQue|half|float|RoundMode|MmadParams|HardEvent)\b/g,'<span class="t">$1</span>');
  e=e.replace(/\b(DataCopy|Mmad|Add|Relu|Cast|Muls|EnQue|DeQue|AllocTensor|FreeTensor|Get|SetFlag|WaitFlag|PipeBarrier|InitBuffer|SetGlobalBuffer)\b/g,'<span class="f">$1</span>');
  return e;
}

// 为某个文件建立 行号 -> tensor 的映射
function buildLineMap(file){
  const map={}, ranges=[];
  DATA.tensors.filter(t=>t.srcFile===file).forEach(t=>{
    ranges.push({id:t.id,start:t.srcLineStart,end:t.srcLineEnd,hot:t.srcHotLine,name:t.name,kind:t.kind});
    for(let l=t.srcLineStart;l<=t.srcLineEnd;l++) map[l]=t.id;
  });
  ranges.sort((a,b)=>a.start-b.start);
  return {map,ranges};
}

function openSourcePanel(t){
  const file=t.srcFile;
  const content=(DATA.sourceFiles||{})[file];
  appEl.classList.add('src-open');
  document.getElementById('srcTabName').textContent=file;

  // 文件变化才重建
  if(srcState.file!==file){
    const {map,ranges}=buildLineMap(file);
    srcState={file,lineToTensor:map,ranges};
    renderSourceFile(file, content||'// (源码未提供)');
  }
  highlightTensorInSource(t);
  // 居中滚动到热行
  scrollSourceTo(t.srcHotLine||t.srcLineStart, true);
  resize(); // 画布列宽变了，重算
}

function renderSourceFile(file, content){
  const code=document.getElementById('srcCode');
  const lines=content.split('\n');
  let html='';
  lines.forEach((ln,i)=>{
    const no=i+1;
    const tid=srcState.lineToTensor[no];
    const mapped=tid?'mapped':'';
    const tname = tid? DATA.tensors.find(x=>x.id===tid).name : '';
    const tag = tid ? `<span class="tag" style="color:${KIND_COLOR[DATA.tensors.find(x=>x.id===tid).kind]}99">◀ ${tname}</span>`:'';
    html+=`<div class="src-line ${mapped}" data-line="${no}" data-tid="${tid||''}">`
        +`<span class="gut">${no}</span>`
        +`<span class="ln-txt">${hl(ln)||' '}${tag}</span></div>`;
  });
  code.innerHTML=html;
  // 点击源码行 -> 选中对应 Tensor，联动左图
  code.querySelectorAll('.src-line').forEach(el=>{
    el.addEventListener('click',()=>{
      const tid=el.dataset.tid;
      if(!tid) return;
      const t=DATA.tensors.find(x=>x.id===tid);
      if(!t) return;
      // 若该 Tensor 不在当前 Buffer 视图，自动切换 Buffer
      if(t.buffer!==state.buffer){
        state.buffer=t.buffer;
        document.getElementById('bufSel').value=t.buffer;
        state.ox=0;state.oy=0;state.scale=1;
      }
      state.selected=t.id;
      renderDetail(t);
      highlightTensorInSource(t);
      flashTensor(t);
      draw();
    });
  });
}

function highlightTensorInSource(t){
  const code=document.getElementById('srcCode');
  code.querySelectorAll('.src-line').forEach(el=>{
    el.classList.remove('range','hot');
    const no=+el.dataset.line;
    if(t && no>=t.srcLineStart && no<=t.srcLineEnd) el.classList.add('range');
    if(t && no===t.srcHotLine) el.classList.add('hot');
  });
  document.getElementById('srcStatus').innerHTML=
    t? `${t.srcFile}  ·  <b>${t.name}</b>  ·  行 ${t.srcLineStart}-${t.srcLineEnd}（热行 ${t.srcHotLine}）` : srcState.file;
}

function scrollSourceTo(lineNo, center){
  const el=document.querySelector(`.src-line[data-line="${lineNo}"]`);
  if(!el) return;
  el.scrollIntoView({block:center?'center':'nearest',behavior:'smooth'});
}

// 左图：让被选中的 Tensor 闪一下（视觉反馈）
let flashId=null,flashT=0;
function flashTensor(t){
  flashId=t.id; flashT=performance.now();
  const tick=()=>{
    const dt=performance.now()-flashT;
    draw();
    if(dt<700) requestAnimationFrame(tick); else {flashId=null;draw();}
  };
  requestAnimationFrame(tick);
}

// prev/next 跳转到文件中相邻的 Tensor 段
function navSource(dir){
  if(!srcState.ranges.length) return;
  const cur=state.selected;
  let idx=srcState.ranges.findIndex(r=>r.id===cur);
  idx = idx<0 ? 0 : idx+dir;
  idx=(idx+srcState.ranges.length)%srcState.ranges.length;
  const r=srcState.ranges[idx];
  const t=DATA.tensors.find(x=>x.id===r.id);
  if(t.buffer!==state.buffer){
    state.buffer=t.buffer;document.getElementById('bufSel').value=t.buffer;
    state.ox=0;state.oy=0;state.scale=1;
  }
  state.selected=t.id;renderDetail(t);highlightTensorInSource(t);
  scrollSourceTo(t.srcHotLine||t.srcLineStart,true);flashTensor(t);draw();
}

document.getElementById('srcClose').onclick=()=>{
  appEl.classList.remove('src-open');resize();
};
document.getElementById('srcPrev').onclick=()=>navSource(-1);
document.getElementById('srcNext').onclick=()=>navSource(1);

// ---- controls ----
const bufSel=document.getElementById('bufSel');
DATA.buffers.forEach(b=>{const o=document.createElement('option');o.value=b.name;o.textContent=`${b.name} · ${fmtKB(b.capacity)}`;bufSel.appendChild(o);});
bufSel.value=state.buffer;
bufSel.onchange=()=>{state.buffer=bufSel.value;state.selected=null;state.ox=0;state.oy=0;state.scale=1;renderDetail(null);draw();};

document.getElementById('btnPeak').onclick=function(){state.showPeak=!state.showPeak;this.classList.toggle('active');draw();};
document.getElementById('btnGrid').onclick=function(){state.showGrid=!state.showGrid;this.classList.toggle('active');draw();};
document.getElementById('btnReset').onclick=()=>{state.ox=0;state.oy=0;state.scale=1;draw();};
document.querySelectorAll('.toggle').forEach(b=>{
  b.onclick=function(){
    document.querySelectorAll('.toggle').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');state.filter=this.dataset.kind;draw();
  };
});

window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
