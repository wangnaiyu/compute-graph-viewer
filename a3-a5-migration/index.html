<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A3/A5 算子迁移工作台</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23101010'/%3E%3Cpath d='M8 17h16M16 8v16' stroke='%23e6e6e6' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/workbench-shell/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/floating-playback-control/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/ide-frame/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aic-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aiv-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/memory-architecture/pattern.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <section class="pto-ide-frame migration-frame" data-ide-frame data-host="standalone" data-cursor-dots="true" data-inspector-collapsed="false" aria-label="A3/A5 operator migration workbench">
    <header class="pto-ide-frame__topbar pto-ide-frame__standalone-chrome">
      <div class="pto-ide-frame__topbar-left">
        <span class="pto-ide-frame__host-chip" data-ide-slot="host-chip">
          <svg class="pto-ide-frame__host-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 3h7l5 5v13H7z"></path>
            <path d="M14 3v5h5"></path>
            <path d="M10 13h6"></path>
            <path d="M10 17h4"></path>
          </svg>
          <span>A3/A5 Migration</span>
        </span>
        <span class="migration-workspace-title">Migration Workbench</span>
      </div>
      <div class="pto-ide-frame__topbar-center">
        <label class="migration-search pto-ide-frame__search" data-ide-slot="global-search">
          <svg class="pto-ide-frame__search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m16.5 16.5 4 4"></path>
          </svg>
          <input id="global-search" type="search" autocomplete="off" placeholder="RegBase / SIMT / L0C2UB / CCU">
        </label>
      </div>
      <div class="pto-ide-frame__topbar-right">
        <div class="pto-ide-frame__window-actions" data-ide-slot="window-controls" aria-label="Window controls">
          <button class="pto-ide-frame__window-action" type="button" id="theme-toggle" aria-label="Switch to light mode" aria-pressed="false" title="Switch to light mode">
            <svg class="pto-ide-frame__window-icon" id="theme-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </button>
          <button class="pto-ide-frame__window-action is-selected" type="button" id="toggle-inspector" aria-label="Hide inspector" aria-pressed="true" title="Hide inspector">
            <svg class="pto-ide-frame__window-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2"></rect>
              <path d="M15 4v16"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <div class="pto-ide-frame__body">
      <nav class="pto-ide-frame__activity-rail pto-ide-frame__standalone-chrome" data-ide-slot="activity-rail" aria-label="Activity rail">
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button is-selected" type="button" data-ide-toggle="explorer" aria-label="Explorer" aria-controls="migration-explorer-pane" aria-expanded="true" aria-pressed="true" title="Explorer">
          <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9l-.81-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path>
          </svg>
        </button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" id="rail-search" aria-label="Search" title="Search">
          <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
        </button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" id="rail-diff" aria-label="Source control" title="Source control">
          <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="18" cy="19" r="2"></circle>
            <circle cx="6" cy="19" r="2"></circle>
            <circle cx="6" cy="6" r="2"></circle>
            <path d="M13 6h3a2 2 0 0 1 2 2v8"></path>
            <path d="M6 8v9"></path>
          </svg>
        </button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" id="rail-profiling" aria-label="Terminal" title="Terminal">
          <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <path d="m7 8 4 4-4 4"></path>
            <path d="M13 16h5"></path>
          </svg>
        </button>
      </nav>

      <div class="pto-ide-frame__workarea">
        <div class="pto-ide-frame__split migration-split" data-ide-split="a3-a5-main" data-split-direction="horizontal" data-sizes="20,48,32" data-pixel-sizes="300" data-min-size="240,460,320">
          <aside class="pto-ide-frame__pane pto-ide-frame__explorer" data-ide-pane="explorer" id="migration-explorer-pane">
            <header class="pto-ide-frame__pane-header" data-ide-slot="navigation-header">
              <div>
                <strong>迁移导航</strong>
                <span id="nav-count">0 nodes</span>
              </div>
            </header>
            <div class="pto-ide-frame__pane-body migration-nav" data-ide-slot="navigation">
              <section class="migration-nav-group">
                <h2>迁移场景</h2>
                <div id="scenario-nav" class="migration-nav-list"></div>
              </section>
              <section class="migration-nav-group">
                <h2>内容路径</h2>
                <div id="path-nav" class="migration-nav-list"></div>
              </section>
              <section class="migration-nav-group">
                <h2>快速定位</h2>
                <div id="keyword-nav" class="migration-keywords"></div>
              </section>
            </div>
          </aside>

          <main class="pto-ide-frame__pane" data-ide-pane="editor-preview">
            <div class="pto-ide-frame__tabstrip" data-ide-slot="preview-tabs">
              <div id="top-tabs" class="tab-control" role="tablist" aria-label="Workbench sections"></div>
            </div>
            <header class="pto-ide-frame__pane-header migration-main-header" data-ide-slot="preview-header">
              <div>
                <strong id="view-title">结论 / Why it matters</strong>
                <span id="view-subtitle">950/A5 migration guide</span>
              </div>
              <div id="view-status" class="migration-status-row"></div>
            </header>
            <div class="pto-ide-frame__pane-body migration-main-scroll" data-ide-slot="preview">
              <section id="content-root" class="migration-content" aria-live="polite"></section>
            </div>
          </main>

          <aside class="pto-ide-frame__pane migration-inspector" data-ide-pane="inspector">
            <header class="pto-ide-frame__pane-header migration-inspector-header" data-ide-slot="inspector-header">
              <div class="migration-header-title">
                <strong>Memory Architecture</strong>
                <span id="architecture-focus">Ascend 950B</span>
              </div>
              <div class="architecture-actions">
                <div class="zoom-control-group architecture-zoom-controls" aria-label="Memory architecture zoom controls">
                  <button class="btn btn-icon btn-ghost btn-sm" type="button" id="zoom-out" aria-label="Zoom out" title="Zoom out">−</button>
                  <span class="zoom-control-readout" id="zoom-readout">40%</span>
                  <button class="btn btn-icon btn-ghost btn-sm" type="button" id="zoom-in" aria-label="Zoom in" title="Zoom in">+</button>
                  <button class="btn btn-icon btn-ghost btn-sm" type="button" id="zoom-reset" aria-label="Reset zoom to 40%" title="Reset zoom">↺</button>
                </div>
                <button class="btn btn-sm" type="button" id="diff-toggle" aria-pressed="false">Diff off</button>
              </div>
            </header>
            <div class="pto-ide-frame__pane-body migration-inspector-body" data-ide-slot="inspector">
              <section class="architecture-panel" aria-label="Ascend 950 memory architecture evidence">
                <div class="architecture-viewport" id="architecture-viewport">
                  <div class="architecture-sizer" id="architecture-sizer">
                    <div class="architecture-canvas" id="architecture-canvas">
                      <div id="architecture-stage" class="architecture-stage"></div>
                      <div id="diff-overlay" class="diff-overlay" aria-label="A3 to A5 diff overlay"></div>
                    </div>
                  </div>
                </div>
              </section>
              <section class="evidence-panel">
                <div class="evidence-panel-head">
                  <strong>当前证据</strong>
                  <span id="active-evidence-count" class="stat-chip">0 focus</span>
                </div>
                <div id="active-evidence" class="active-evidence"></div>
              </section>
            </div>
          </aside>
        </div>

        <footer class="pto-ide-frame__status-strip pto-ide-frame__standalone-chrome migration-footer" data-ide-slot="status">
          <span id="status-skill">split ready</span>
          <span id="status-preview">zoom 40%</span>
          <span id="status-active">active: conclusion</span>
        </footer>
      </div>
    </div>
  </section>

  <script src="../vendor/pto-design-system/patterns/workbench-shell/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/floating-playback-control/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/ide-frame/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aiv-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aic-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/memory-architecture/pattern.js"></script>
  <script src="./content.js"></script>
  <script src="./app.js"></script>
</body>
</html>
