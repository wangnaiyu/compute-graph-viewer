<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="PTO Design System">
  <defs>
    <linearGradient id="dsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#dsBg)"/>
  <!-- color swatches -->
  <g>
    <rect x="40" y="44" width="46" height="46" rx="10" fill="#90a4d4"/>
    <rect x="96" y="44" width="46" height="46" rx="10" fill="#3f8f6b"/>
    <rect x="152" y="44" width="46" height="46" rx="10" fill="#d98a32"/>
    <rect x="208" y="44" width="46" height="46" rx="10" fill="#c0504d"/>
    <rect x="264" y="44" width="46" height="46" rx="10" fill="#1f2733"/>
  </g>
  <!-- type scale -->
  <rect x="40" y="116" width="170" height="14" rx="7" fill="#1f2733"/>
  <rect x="40" y="140" width="120" height="11" rx="5.5" fill="#5b6472"/>
  <rect x="40" y="160" width="200" height="9" rx="4.5" fill="#9aa3b2"/>
  <!-- component chips -->
  <g>
    <rect x="40" y="196" width="74" height="30" rx="8" fill="#1f2733"/>
    <rect x="124" y="196" width="74" height="30" rx="8" fill="#fff" stroke="#cfd5e0"/>
    <rect x="208" y="196" width="58" height="30" rx="15" fill="#fff" stroke="#cfd5e0"/>
  </g>
  <!-- pattern preview -->
  <g transform="translate(300 110)">
    <rect x="0" y="0" width="140" height="116" rx="12" fill="#fff" stroke="#e1e5ec"/>
    <rect x="16" y="18" width="108" height="18" rx="5" fill="#dfe8f5"/>
    <rect x="16" y="46" width="70" height="12" rx="4" fill="#eef1f7"/>
    <rect x="16" y="64" width="108" height="12" rx="4" fill="#eef1f7"/>
    <rect x="16" y="86" width="46" height="14" rx="7" fill="#90a4d4"/>
  </g>
  <text x="40" y="30" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1f2733">PTO Design System</text>
  <text x="300" y="30" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#9aa3b2">Token · Component · Pattern</text>
</svg>
