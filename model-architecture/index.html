<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大模型整网架构 — PTO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script>if (new URLSearchParams(location.search).has('embed')) document.documentElement.classList.add('embed-mode');</script>
    <style>
      .embed-mode header.toolbar { display: none !important; }
      .embed-mode .view-panel { display: none !important; }
    </style>
    <script defer src="./x6.min.js"></script>
    <script defer src="../js/colormap.js"></script>
    <script defer src="./data.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-l">
        <div class="toolbar-logo">大模型整网架构</div>
        <span class="graph-title">DeepSeek V3 · 模型架构</span>
      </div>
      <div class="toolbar-r">
        <div class="view-picker segmented-control" role="tablist" aria-label="View Mode">
          <button id="btn-structure" class="btn btn-compact view-btn is-selected" role="tab" aria-selected="true">结构视图</button>
          <button id="btn-parallel" class="btn btn-compact view-btn" role="tab" aria-selected="false">并行视图</button>
        </div>
        <div class="model-picker segmented-control">
          <button id="btn-v3" class="btn btn-compact model-btn is-selected">V3</button>
          <button id="btn-v3_2" class="btn btn-compact model-btn">V3.2</button>
        </div>
      </div>
    </header>
    <main id="app" class="app-root" aria-live="polite"></main>
  </body>
</html>
