<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练管理平台 · 任务对比</title>
<script>
  (() => {
    const params = new URLSearchParams(window.location.search);
    const theme = params.get("theme");
    if (theme === "dark" || theme === "light") {
      document.documentElement.dataset.theme = theme;
    }
  })();
</script>
<link rel="stylesheet" href="./css/foundation.css">
<link rel="stylesheet" href="./css/semantic.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/style.css">
<!-- IDE frame shell (patterns/ide-frame + patterns/workbench-shell, vendored locally per repo convention so this folder can move on its own) -->
<link rel="stylesheet" href="./css/workbench-shell-pattern.css">
<link rel="stylesheet" href="./css/ide-frame-pattern.css">
<style>
  /* ==== compare-mode 页面级样式：迁移自旧版私有玻璃拟态样式表，颜色/圆角/间距全部改用设计系统 token；
     Kanban 泳道看板、TensorBoard 式折线对比图等无对应 PTO pattern 的结构保留为 page-local 类。 ==== */

  /* 页面级字体统一：--font-mono（JetBrains Mono/Fira Code/Consolas）本身不含中文字形，页面里大量
     指标名/分组名/提示文案是中英混排（如「GPU 利用率」「基线」），中文部分会落到浏览器默认等宽字体
     （如 Windows 上的 NSimSun），与 --font-sans 里统一使用的 PingFang SC/Noto Sans SC 中文字形不一致。
     此处补齐与 --font-mono 相同的中文回退字体，使全页中文字形始终一致，西文/数字部分仍保持等宽观感。 */
  :root { --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', 'PingFang SC', 'Noto Sans SC', monospace; }

  /* 任务状态点（侧栏任务列表 / 泳道卡片 / 最佳任务排名共用） */
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  /* 任务身份色，非状态色：class 名沿用历史标识符（blue/green/red/orange/purple 只是任务的 id，
     不代表健康度也不代表实际取色）。按要求把紫色系从 2 族收到 1 族（保留 l0a-violet，弃用
     l0b-deep-violet），换入 ub-green 代表「翠绿/青」——PTO 里唯一不与 success（--success 用的是
     另一支更偏青绿的语义色）冲突的绿色阶；mte-amber 代表「黄」。5 个任务正好对应 PTO highlight
     体系里全部 5 个非红/非 success-green 色阶族：copy-blue / ub-green / accum-orange / l0a-violet /
     mte-amber，每族取一个代表 step。用 dataviz 技能的 6 项校验（CVD 区分度、对比度，--mode
     light/dark 双跑）挑出具体 step 和顺序，使相邻两两都清晰可辨（暗色下 accum-orange-700 对比度
     2.8:1 略低于 3:1，由图例本身的文字标签兜底，符合校验里「补充编码」的豁免条件）。 */
  .dot.red { background: var(--highlight-copy-blue-400); }
  .dot.blue { background: var(--highlight-ub-green-700); }
  .dot.green { background: var(--highlight-accum-orange-700); }
  .dot.orange { background: var(--highlight-l0a-violet-400); }
  .dot.purple { background: var(--highlight-mte-amber-700); }

  /* 侧栏 explorer pane-body：pane-header/nav-item 已去掉，改由 pane-body 自身承担 4 周内边距 +
     顶部「任务对比」静态标题（纯文字，不承担返回首页交互，故无 hover 变色/指针样式）。 */
  .cmp-explorer-body { padding: var(--space-3); }
  .cmp-explorer-title { display: flex; align-items: center; width: 100%; margin: 0 0 10px; padding: 0 0 0 12px; border: 0;
    background: transparent; font: var(--ide-frame-title-font); color: var(--foreground); text-align: left; }

  /* compare 模式左侧任务勾选列表 */
  .cmp-task-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: var(--radius-lg);
    cursor: pointer; color: var(--foreground-secondary); border: 1px solid transparent;
    transition: all var(--duration-fast) var(--easing-default); user-select: none; }
  .cmp-task-item:hover { background: var(--state-hover); }
  .cmp-task-item.is-selected { color: var(--foreground); font-weight: 500;
    background: color-mix(in srgb, var(--primary) 8%, transparent); }
  /* 任务名中间省略：拆成 head/tail 两段，head 用 flex 收缩 + ellipsis 吃掉溢出，tail 常驻不缩，
     视觉上呈现「开头...结尾」而非默认的尾部省略，方便区分仅版本号/后缀不同的同名任务 */
  .cmp-task-name { flex: 1; display: flex; min-width: 0; overflow: hidden; }
  .cmp-task-name-head { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .cmp-task-name-tail { white-space: nowrap; flex-shrink: 0; }
  /* 原生 checkbox 在暗色底上默认渲染成刺眼的白底方块，appearance:none 后按 token 自绘勾选框，
     未勾选态贴合面板底色（border-default 描边 + surface-2 底），勾选态用 ::after 画对勾，不依赖系统控件配色 */
  .cmp-cb { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; margin: 0; border-radius: 3px; flex-shrink: 0;
    cursor: pointer; border: 1.5px solid var(--border-default); background: var(--surface-2); position: relative;
    transition: background var(--duration-fast) var(--easing-default), border-color var(--duration-fast) var(--easing-default); }
  .cmp-cb:hover { border-color: var(--border-strong); }
  .cmp-cb:checked { background: var(--primary); border-color: var(--primary); }
  .cmp-cb:checked::after { content: ""; position: absolute; left: 4px; top: 1px; width: 3px; height: 7px;
    border: solid var(--primary-foreground); border-width: 0 1.6px 1.6px 0; transform: rotate(45deg); }
  /* 基线标签默认隐藏，仅在所属任务行悬浮时或本身已是基线时显示，减少非基线任务行的视觉噪音 */
  .cmp-base-tag { font-size: 10px; font-family: var(--font-mono); color: var(--foreground-muted); border: 1px solid var(--border-default);
    border-radius: 999px; padding: 1px 8px; cursor: pointer; flex-shrink: 0; opacity: 0;
    transition: all var(--duration-fast) var(--easing-default); }
  .cmp-task-item:hover .cmp-base-tag, .cmp-base-tag.is-selected { opacity: 1; }
  .cmp-base-tag:hover { border-color: var(--border-strong); color: var(--foreground-secondary); }
  .cmp-base-tag.is-selected { background: var(--surface-4); color: var(--foreground); border-color: var(--surface-4); }

  /* 主内容 pane-body：去掉了顶部 pane-title 后自行承担内容内边距；#compareView 内的 .cmp-topbar
     用负 margin 顶到 pane 边缘再用等值 padding 补回，配合 position:sticky 钉在滚动区顶部。 */
  .cmp-pane-body { padding: var(--space-4); }
  #compareView { display: flex; flex-direction: column; min-height: 100%; }

  /* compare 顶部工具条：sub-tabs 复用共享 .tab-control，右侧为动态控制区（平滑滑杆 / 切换按钮）；
     滚动图表列表时固定在 pane 顶部，背景复用 ide-frame pane-header 的毛玻璃填充色，保持视觉一致 */
  .cmp-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    position: sticky; top: calc(-1 * var(--space-4)); z-index: 15; margin: calc(-1 * var(--space-4)) calc(-1 * var(--space-4)) 16px;
    padding: var(--space-3) var(--space-4); background: var(--ide-frame-pane-header-fill);
    backdrop-filter: var(--ide-frame-pane-backdrop-filter); -webkit-backdrop-filter: var(--ide-frame-pane-backdrop-filter); }
  .cmp-topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* 曲线平滑拖动条（TensorBoard 式 Smoothing） */
  .smooth-ctrl { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--foreground-secondary);
    user-select: none; white-space: nowrap; }
  .smooth-ctrl .smooth-label { font-weight: 500; }
  .smooth-ctrl input[type=range] { -webkit-appearance: none; appearance: none; width: 108px; height: 4px;
    border-radius: 999px; background: var(--border-default); outline: none; cursor: pointer; accent-color: var(--primary); }
  .smooth-ctrl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; background: var(--primary); border: 2px solid var(--surface-1); cursor: pointer; }
  .smooth-ctrl input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%;
    background: var(--primary); border: 2px solid var(--surface-1); cursor: pointer; }
  .smooth-ctrl .smooth-val { font-family: var(--font-mono); font-size: 11px; color: var(--foreground-muted); min-width: 26px; text-align: right; }

  /* 标记最优：开关而非按钮（用户明确要求）。PTO 组件库无通用 switch 原语，token 化后保留为
     page-local 组件，与「只看差异」等过滤按钮做视觉区分（开关=常驻状态位，按钮=一次性过滤动作）。 */
  .cmp-switch { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; user-select: none;
    font-size: 12px; color: var(--foreground-secondary); }
  .cmp-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .cmp-switch-track { position: relative; width: 30px; height: 17px; border-radius: 999px; flex-shrink: 0;
    background: var(--surface-4); transition: background var(--duration-fast) var(--easing-default); }
  .cmp-switch-track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 13px; height: 13px;
    border-radius: 50%; background: var(--foreground); transition: transform var(--duration-fast) var(--easing-default); }
  .cmp-switch input:checked + .cmp-switch-track { background: var(--primary); }
  .cmp-switch input:checked + .cmp-switch-track::after { transform: translateX(13px); background: var(--primary-foreground); }
  .cmp-switch input:focus-visible + .cmp-switch-track { box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 30%, transparent); }
  .cmp-switch-label.is-on { color: var(--foreground); font-weight: 500; }

  /* 图表对比：卡片壳 + 分区折叠（TensorBoard scalars 式） */
  .card { background: var(--surface-2); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 18px; }
  .cmp-empty { padding: 48px 24px; text-align: center; color: var(--foreground-muted); }
  .cmp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  /* 图表卡片去边框，仅靠 surface 底色区分，避免每张折线图外多一圈框线 */
  .cmp-grid .card { border: none; }
  /* 放大态：grid-column 撑满整行——sparse 打包算法（默认，非 dense）下，若该卡片左侧同行已有其他
     卡片放不下整行宽度，会自动换到下一行再撑大；撑大后原本排在它后面的卡片也自然被挤到下一行，
     两条需求都由 grid 默认排布规则满足，无需额外 JS 计算行位置 */
  .cmp-grid .card.is-expanded { grid-column: 1 / -1; }
  .cmp-chart-title { font-family: var(--font-mono); font-size: 10px; color: var(--foreground-muted);
    letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
  .cmp-chart-area { position: relative; cursor: crosshair; }
  .cmp-chart-area svg { display: block; }
  .cmp-chart-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .cmp-chart-head-left { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .cmp-chart-head-left .cmp-chart-title { margin-bottom: 0; }
  /* 放大/还原图标：常驻显示于卡片头右上角，与 bestTag 同行两端对齐（cmp-chart-head 已是
     justify-content: space-between） */
  .cmp-chart-expand-btn { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px;
    flex-shrink: 0; border-radius: var(--radius-md); color: var(--foreground-muted); cursor: pointer;
    transition: all var(--duration-fast) var(--easing-default); }
  .cmp-chart-expand-btn:hover { color: var(--foreground); background: var(--state-hover); }
  .cmp-chart-expand-btn.is-active { color: var(--primary); }
  .cmp-chart-expand-btn svg { width: 13px; height: 13px; }
  .cmp-best-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-family: var(--font-mono);
    font-weight: 400; white-space: nowrap; color: var(--foreground-secondary); }
  .cmp-best-medal { font-size: 11px; }
  .cmp-best-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  /* 沿用左侧勾选栏的完整任务名（而非缩短版）；空间足够，不做宽度限制/省略截断 */
  .cmp-best-name { white-space: nowrap; }
  .cmp-chart-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--border-subtle); }
  .cmp-chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px;
    font-family: var(--font-mono); color: var(--foreground-secondary); white-space: nowrap; }
  .cmp-legend-line { width: 14px; height: 0; border-top-width: 2px; border-top-style: solid; flex-shrink: 0; }
  .cmp-legend-base-tag { font-size: 9px; font-family: var(--font-mono); background: var(--surface-4); color: var(--foreground);
    border-radius: 999px; padding: 1px 7px; flex-shrink: 0; }
  .cmp-chart-tip { position: absolute; z-index: 30; pointer-events: none; display: none;
    background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 10px;
    padding: 6px 9px; width: 200px; box-sizing: border-box; }
  /* 固定宽度 + 各行 nowrap：气泡尺寸不再随任务名/数值长度跳变，值列、差异列各占定宽固定列，
     不够放的任务名走省略号，不整体折行 */
  .cmp-tip-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; white-space: nowrap; }
  .cmp-tip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cmp-tip-name { color: var(--foreground-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cmp-tip-val { flex-shrink: 0; width: 46px; text-align: right; font-family: var(--font-mono); font-weight: 600; color: var(--foreground); }
  .cmp-tip-head { font-family: var(--font-mono); font-size: 10px; color: var(--foreground-muted); margin-bottom: 5px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border-subtle); letter-spacing: .04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* 差异列始终占位（基线行本身/未选基线时留空），使数值列、差异列的右边界在各行间对齐 */
  .cmp-tip-dev { flex-shrink: 0; width: 38px; text-align: right; font-size: 10px; font-family: var(--font-mono); }

  .cmp-group { margin-bottom: 20px; }
  .cmp-group:last-child { margin-bottom: 0; }
  .cmp-group .cmp-grid { margin-bottom: 0; }
  .cmp-group.collapsed .cmp-grid { display: none; }
  .cmp-group-head { display: flex; align-items: center; gap: 10px; padding: 4px 2px 11px; margin-bottom: 14px;
    cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: border-color var(--duration-fast) var(--easing-default); }
  .cmp-group.collapsed .cmp-group-head { border-bottom-color: var(--border-default); }
  .cmp-group-chevron { color: var(--foreground-muted); font-size: 15px; line-height: 1; flex-shrink: 0;
    display: inline-flex; transform: rotate(90deg); transition: transform .2s; }
  .cmp-group.collapsed .cmp-group-chevron { transform: rotate(0deg); }
  .cmp-group-title { font: var(--button-font); font-size: 14px; font-weight: 600; letter-spacing: -.01em; color: var(--foreground); }
  /* 展开态下方已有图表能说明分区内容，提示文字冗余，默认隐藏；收起后图表看不见了，
     提示文字改为唯一的内容线索，再显示出来 */
  .cmp-group-hint { display: none; font-family: var(--font-mono); font-size: 10px; color: var(--foreground-muted); letter-spacing: .03em; }
  .cmp-group.collapsed .cmp-group-hint { display: inline; }

  /* 折线图 + y 轴刻度容器（cmpChart()/fillYAxis() 生成的数据可视化结构，保留原样） */
  .km-chart-row { display: flex; }
  .km-chart-row > .cmp-chart-area { flex: 1; min-width: 0; }
  .km-yaxis { display: flex; flex-direction: column; justify-content: space-between; padding: 12px 0; width: 30px; flex-shrink: 0; }
  .km-yaxis span { font-size: 9px; font-family: var(--font-mono); color: var(--foreground-muted); text-align: right; line-height: 1; white-space: nowrap; padding-right: 4px; display: block; }
  .km-axis { display: flex; justify-content: space-between; margin-top: 8px; padding: 0 2px 0 30px;
    font-size: 10px; color: var(--foreground-muted); font-family: var(--font-mono); }
  .km-axis-title { text-align: center; font-size: 11px; color: var(--foreground-muted); margin-top: 2px; padding-left: 30px; font-family: var(--font-mono); }

  /* ===== 最佳任务排名卡片 ===== */
  /* 按要求去掉模块外边框，仅靠 surface 底色与圆角跟周围区分 */
  .best-rank-card { background: var(--surface-2); border-radius: var(--radius-lg);
    margin-bottom: 14px; overflow: hidden; }
  .best-rank-head { display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    font: var(--button-font); font-size: 13px; font-weight: 600; letter-spacing: -.01em;
    cursor: pointer; user-select: none; transition: background var(--duration-fast) var(--easing-default); border-bottom: 1px solid var(--border-subtle); }
  .best-rank-head:hover { background: var(--state-hover); }
  .best-rank-chevron { color: var(--foreground-muted); font-size: 14px; font-weight: 400; transition: transform .2s;
    flex-shrink: 0; display: inline-flex; line-height: 1; }
  .best-rank-card.expanded .best-rank-chevron { transform: rotate(90deg); }
  /* 排名设置入口：暂只做展示，样式沿用 .cmp-chart-expand-btn 的图标按钮规格，未接功能 */
  .best-rank-settings-btn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px;
    margin-left: auto; flex-shrink: 0; border-radius: var(--radius-md); color: var(--foreground-muted); cursor: pointer;
    transition: all var(--duration-fast) var(--easing-default); }
  .best-rank-settings-btn:hover { color: var(--foreground); background: var(--state-hover); }
  .best-rank-settings-btn svg { width: 14px; height: 14px; }
  .best-rank-single { display: block; }
  .best-rank-body { display: none; }
  .best-rank-card.expanded .best-rank-single { display: none; }
  .best-rank-card.expanded .best-rank-body { display: block; }
  .best-rank-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    border-bottom: 1px solid var(--border-subtle); min-width: 0; }
  .best-rank-row:last-child { border-bottom: none; }
  /* 左到右渐隐，避免整行一块纯色显得生硬 */
  .best-rank-row.rank1 { background: linear-gradient(to right, color-mix(in srgb, var(--warning) 22%, transparent), transparent); }
  /* margin-left 让序号左沿卡在 .best-rank-head 里「最佳任务」文字的起始列（跳过 chevron 那一列），
     形成序号相对表头的自然缩进，而非居中在整个 chevron+文字 的宽度里 */
  .best-rank-num { width: 20px; margin-left: 14px; text-align: left; font-family: var(--font-mono); font-size: 12px;
    font-weight: 700; color: var(--foreground-muted); flex-shrink: 0; }
  .best-rank-num.gold { color: var(--warning); }
  .best-rank-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* 固定列宽（而非 max-content）：每行的 .best-rank-metrics 都是独立的 grid 实例，若按内容自适应，
     列宽会随本行 value 文本长度浮动，导致下一个指标列的起始位置逐行错位——key 和 value 都对不齐。
     改成固定像素宽后，同一列在所有行里的左右边界完全相同，key 靠列左沿、value 靠列右沿（margin-left:
     auto）天然对齐。这里的 repeat(3, 200px) 只是没有内联 style 时的兜底；实际列宽由 JS 按
     BEST_RANK_METRIC_WIDTH 逐列内联覆盖（loss/mfu 短 label 用更窄的列，避免 value 被撑得离 key
     很远），而不是 3 列统一取最宽的 grad_norm 尺寸。 */
  .best-rank-metrics { display: grid; grid-template-columns: repeat(3, 200px); gap: 6px 0; flex-shrink: 0; margin-left: auto; }
  /* best-rank-metric 的 border-left 是同一行内多组指标间的表格式分隔线（真实的数据表格列分隔，
     非装饰用边框），属于设计系统「表格/网格分隔符」豁免场景，保留 —— 见文末 residue check。
     3 列一行自动换行，nth-child(3n+1) 是每行行首，去掉左分隔线 */

// applyTheme()/toggleTheme()/THEME_TOGGLE_ICONS 一致；本页无整网图，故不调用 renderArchitecture。
// ============================================================
let currentTheme = document.documentElement.dataset.theme === "light" ? "light" : "dark";
const THEME_TOGGLE_ICONS = {
  toDark: '<path d="M12 3a6.5 6.5 0 0 0 7.8 8.8A8 8 0 1 1 12 3z"></path>',
  toLight: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>',
};
function applyTheme(theme){
  currentTheme = theme === "light" ? "light" : "dark";
  document.documentElement.dataset.theme = currentTheme;
  document.body.dataset.theme = currentTheme;
  const themeToggle = document.getElementById("themeToggle");
  const themeToggleIcon = document.getElementById("themeToggleIcon");
  const toDark = currentTheme === "light";
  const nextMode = toDark ? "深色模式" : "浅色模式";
  if(themeToggle){
    themeToggle.setAttribute("aria-pressed", String(currentTheme === "light"));
    themeToggle.setAttribute("title", `切换${nextMode}`);
    themeToggle.setAttribute("aria-label", `切换${nextMode}`);
  }
  if(themeToggleIcon){
    themeToggleIcon.innerHTML = toDark ? THEME_TOGGLE_ICONS.toDark : THEME_TOGGLE_ICONS.toLight;
  }
}
function toggleTheme(){
  applyTheme(currentTheme === "light" ? "dark" : "light");
}
document.getElementById("themeToggle").addEventListener("click", toggleTheme);

// TensorBoard 式指数滑动平均（带去偏修正）。weight∈[0,1)，0=不平滑，越大越平滑。
function smoothEMA(data, weight){
  if(!(weight>0) || !data || data.length===0) return (data||[]).slice();
  const res = new Array(data.length);
  let acc = 0, deb = 0;
  for(let i=0;i<data.length;i++){
    const v = data[i];
    if(!isFinite(v)){ res[i] = v; continue; }
    acc = acc*weight + (1-weight)*v;
    deb = deb*weight + (1-weight);
    res[i] = acc/deb;
  }
  return res;
}

// ── 曲线业务化：把手工 20 点序列上采样并叠加「确定性抖动」，让对比曲线呈现真实训练的
//    微波动与收敛走势（参考 training-monitoring-v2 精度/infra 10 图的 stepNoise 抖动手法：
//    sin 哈希伪随机，按绝对 index 定域，同一序列每次取值一致）。首尾端点精确保留，故
//    last()/稳态均值/排名/末值最优等口径完全不变——仅用于绘图，绝不改写 TASKS.series。
function cmpHashSeed(str){
  let h = 0; for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i)) | 0;
  return Math.abs(h) % 9973;
}
function cmpFrac(x){ return x - Math.floor(x); }
// 双频叠加哈希噪声：单一 sin 哈希在相邻子点间近似线性摆动，视觉上会呈现规律的「等幅小波浪」；
// 叠加一路频率/相位都不同的第二路哈希后，波形不再是单一周期，抖动看起来才够「随机」。
function cmpNoise(seed, i){
  const n1 = cmpFrac(Math.sin(i*12.9898 + seed*78.233) * 43758.5453) * 2 - 1;
  const n2 = cmpFrac(Math.sin(i*39.3468 + seed*11.135 + 4.7) * 24634.6345) * 2 - 1;
  return n1*0.65 + n2*0.35;
}
// 抖动幅度包络：低频哈希慢速起伏，让抖动幅度本身忽大忽小（真实训练曲线常见的阵发性波动），
// 而不是每个子点都套用同一个 amp——否则再随机的噪声值乘上恒定幅度，视觉上仍会显得「太均匀」。
function cmpAmpEnvelope(seed, i){
  const x = Math.sin(i*0.37 + seed*3.1) * 12543.112;
  return 0.4 + cmpFrac(x) * 1.5;   // ~0.4x – 1.9x
}
const CMP_ENRICH_UP = 24;  // 每段插值子点数：20 控制点 → 456 点，贴近上千 step 训练曲线该有的密度与抖动感
function enrichSeries(vals, seed){
  const N = (vals && vals.length) || 0;
  if(N < 2) return (vals || []).slice();
  const finite = vals.filter(v => isFinite(v));
  if(!finite.length) return vals.slice();
  const rng = (Math.max(...finite) - Math.min(...finite)) || Math.abs(finite[finite.length-1]) || 1;
  // 抖动幅度按「相邻步长的中位数」定标，而非全局值域：loss spike 这类单点跳变会把值域撑大，
  // 若按值域定标，收敛后的平坦段会被过量噪声淹没、反而看不出趋势。中位数对尖峰不敏感，
  // 于是噪声大小自然贴合该指标本身的波动性（grad_norm 抖、lr/vram 稳）。
  const deltas = [];
  for(let i=1;i<N;i++){ const d = Math.abs(vals[i]-vals[i-1]); if(isFinite(d)) deltas.push(d); }
  deltas.sort((a,b)=> a-b);
  const medDelta = deltas.length ? deltas[Math.floor(deltas.length/2)] : 0;
  // 幅度整体 ×10（原上界 rng*0.09 → rng*0.9）：只放大抖动的随机范围，插值骨架（a/b 端点、
  // 阶跃逻辑）不变，故曲线走势/首尾精确值/last()/稳态均值等口径依旧不受影响。
  const ampFlat = Math.min(Math.max(medDelta*1.1, rng*0.015), rng*0.09) * 10;
  const out = [];
  for(let s=0; s<N-1; s++){
    const a = vals[s], b = vals[s+1];
    // 尖峰 / 恢复段（跳变远大于常态步长）：走阶跃而非线性插值——多数子点贴住起点、末子点跳到终点，
    // 抖动同时压到 1/4，避免把 spike 抹成一条缓坡（deepseek loss 0.42→3.20 必须保持陡直）。
    const bigJump = isFinite(a) && isFinite(b) && Math.abs(b-a) > Math.max(rng*0.22, medDelta*6);
    const amp = bigJump ? ampFlat*0.25 : ampFlat;
    for(let k=0; k<CMP_ENRICH_UP; k++){
      if(s===0 && k===0){ out.push(a); continue; }        // 首点精确
      const t = k / CMP_ENRICH_UP;
      let base;
      if(!(isFinite(a) && isFinite(b))) base = t<0.5 ? a : b;
      else if(bigJump)                  base = t<0.75 ? a : b;   // 阶跃，保持尖峰锐利
      else                              base = a + (b-a)*t;      // 常态线性插值
      const env = cmpAmpEnvelope(seed, out.length);
      out.push(isFinite(base) ? base + cmpNoise(seed, out.length)*amp*env : base);
    }
  }
  out.push(vals[N-1]);                                     // 末点精确（保排名/末值一致）
  return out;
}
// 取某任务某指标「业务化」后的绘图序列（缺失返回 null）
function cmpSeriesEnriched(id, m){
  const raw = cmpSeries(id, m);
  return raw ? enrichSeries(raw, cmpHashSeed(id + '|' + m.id)) : null;
}
// 图表对比：按指标方向（down 越低越好 / up 越高越好）算出末值最优的任务；
// flat 无优劣方向、不足 2 个可比任务、或所有末值相等时不标（与参数对比 optimalIds 口径一致）；
// 只有一个任务时无所谓方向，直接把它标成最佳（唯一选项即最优）
function bestChartTask(m, tasksWith){
  if(tasksWith.length === 1) return tasksWith[0];
  if(m.dir !== 'down' && m.dir !== 'up') return null;
  const entries = tasksWith.map(id=>{ const s = cmpSeries(id, m); return s ? { id, n: last(s) } : null; })
    .filter(x=> x && x.n != null);
  if(entries.length < 2) return null;
  if(new Set(entries.map(e=> e.n)).size === 1) return null;
  const best = m.dir==='up' ? Math.max(...entries.map(e=>e.n)) : Math.min(...entries.map(e=>e.n));
  return entries.find(e=> e.n===best).id;
}
// 稳态均值：取序列末尾 n 个点的平均（n 默认 5）
function stableMean(series, n){
  n = n || 5;
  if(!series || !series.length) return null;
  const t = series.slice(-Math.min(n, series.length));
  return t.reduce(function(a,b){ return a+b; }, 0) / t.length;
}
// Borda 计数综合排名——只按最佳任务栏展示的 3 个关键指标（BEST_RANK_METRIC_IDS）算总分，
// 保证「第几名」与卡片里实际展示的指标口径一致，不会出现排名靠未展示指标撑起来的情况
// 返回排好序数组 [{ id, rankSum, metricRanks:{metricId→rank}, metricVals:{metricId→val} }, ...]
// rankSum 越小越好（即排名越靠前）
function computeRankings(sel){
  const dm = BEST_RANK_METRIC_IDS.map(function(id){ return CMP_METRICS.find(function(m){ return m.id===id; }); })
                        .filter(function(m){ return m && (m.dir==='up'||m.dir==='down'); });
  const vals = {};
  sel.forEach(function(id){
    vals[id] = {};
    dm.forEach(function(m){ const s=cmpSeries(id,m); vals[id][m.id] = s ? stableMean(s) : null; });
  });
  const metricRanks = {};
  sel.forEach(function(id){ metricRanks[id]={}; });
  dm.forEach(function(m){
    const entries = sel.map(function(id){ return {id:id,v:vals[id][m.id]}; }).filter(function(e){ return e.v!=null; });
    entries.sort(function(a,b){ return m.dir==='down' ? a.v-b.v : b.v-a.v; });
    entries.forEach(function(e,i){ metricRanks[e.id][m.id]=i+1; });
    sel.forEach(function(id){ if(metricRanks[id][m.id]==null) metricRanks[id][m.id]=entries.length+1; });
  });
  const result = sel.map(function(id){
    const rankSum = dm.reduce(function(s,m){ return s+(metricRanks[id][m.id]||sel.length+1); }, 0);
    return { id:id, rankSum:rankSum, metricRanks:metricRanks[id], metricVals:vals[id] };
  });
  result.sort(function(a,b){ return a.rankSum-b.rankSum; });
  return result;
}

function renderBestRankCard(rankings, sel){
  if(!rankings||!rankings.length) return '';

  const dm = BEST_RANK_METRIC_IDS.map(function(id){ return CMP_METRICS.find(function(m){ return m.id===id; }); })
                        .filter(function(m){ return m && (m.dir==='up'||m.dir==='down'); })
                        .filter(function(m){ return sel.some(function(id){ return !!cmpSeries(id,m); }); });
  // 按实际展示的指标顺序拼出对应列宽，而非统一 repeat(3, 固定值)
  const metricsColStyle = 'grid-template-columns:'+dm.map(function(m){ return (BEST_RANK_METRIC_WIDTH[m.id]||200)+'px'; }).join(' ')+';';
  function rowHtml(entry, rank){
    const t = TASKS[entry.id];
    const isGold = rank===1;
    const metricsHtml = dm.map(function(m){
      const v = entry.metricVals[m.id];
      const r = entry.metricRanks[m.id];
      const dataCount = sel.filter(function(id){ return !!cmpSeries(id,m); }).length;
      const isFirst = dataCount>1 && r===1;
      const valStr = v!=null ? fmtNum(v) : '—';
      return '<div class="best-rank-metric">'
        +'<span class="best-rank-metric-label">稳态 '+m.label+' 均值</span>'
        +(isFirst?'<span class="best-rank-trophy">🥇</span>':'<span style="display:inline-block;width:19px"></span>')
        +'<span class="best-rank-metric-val">'+valStr+'</span>'
        +'</div>';
    }).join('');
    return '<div class="best-rank-row'+(isGold?' rank1':'')+'">'
      +'<span class="best-rank-num'+(isGold?' gold':'')+'">'+rank+'</span>'
      +'<span class="dot '+t.dot+'"></span>'
      +'<span class="best-rank-name">'+t.name+'</span>'
      +'<div class="best-rank-metrics" style="'+metricsColStyle+'">'+metricsHtml+'</div>'
      +'</div>';
  }
  const top1Html = rowHtml(rankings[0], 1);
  const allHtml  = rankings.map(function(e,i){ return rowHtml(e,i+1); }).join('');
  return '<div class="best-rank-card'+(bestRankExpanded?' expanded':'')+'" id="bestRankCard">'
    +'<div class="best-rank-head" id="bestRankToggle">'
    +'<span class="best-rank-chevron">›</span>'
    +'<span>最佳任务</span>'
    +'<span class="best-rank-settings-btn" id="bestRankSettingsBtn" title="排名设置" role="button" aria-label="排名设置">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
    +CMP_SETTINGS_ICON+'</svg></span>'
    +'</div>'
    +'<div class="best-rank-single">'+top1Html+'</div>'
    +'<div class="best-rank-body">'+allHtml+'</div>'
    +'</div>';
}
// 相对基线偏差：abs 绝对差、pct 相对差；bad 表示朝"坏"方向偏离超阈值
function deviation(cur, base, dir){
  const abs = cur - base;
  const pct = base !== 0 ? abs/Math.abs(base) : 0;
  let bad = false;
  if(dir === 'down')      bad = pct > 0.5;          // 越低越好：高于基线 >50% 标红
  else if(dir === 'up')   bad = pct < -0.2;         // 越高越好：低于基线 >20% 标红
  else                    bad = Math.abs(pct) > 0.5;// 仅参考：偏离 >50% 标红
  return { abs, pct, bad };
}

    const grp = head.closest('.cmp-group');
    if(grp) grp.classList.toggle('collapsed');
    cmpDrawAll();
  }));
  // 放大/还原：切换后卡片会因 grid-column 撑满整行 + 图表变高而重新排布，导致自身及后续内容在
  // 页面里上下移动；用切换前后同一张卡片的 getBoundingClientRect().top 之差补偿滚动容器的
  // scrollTop，使该图表顶部相对屏幕的位置保持不变
  body.querySelectorAll('.cmp-chart-expand-btn').forEach(btn=> btn.addEventListener('click', function(e){
    e.stopPropagation();
    const mi = btn.dataset.mi;
    const card = btn.closest('.card');
    const scroller = document.querySelector('.cmp-pane-body');
    const beforeTop = card.getBoundingClientRect().top;
    const nowExpanded = !expandedCharts.has(mi);
    if(nowExpanded) expandedCharts.add(mi); else expandedCharts.delete(mi);
    card.classList.toggle('is-expanded', nowExpanded);
    btn.classList.toggle('is-active', nowExpanded);
    btn.title = nowExpanded ? '还原' : '放大';
    btn.setAttribute('aria-label', nowExpanded ? '还原图表' : '放大图表');
    btn.querySelector('svg').innerHTML = nowExpanded ? CMP_COLLAPSE_ICON : CMP_EXPAND_ICON;
    cmpDrawAll();
    if(scroller) scroller.scrollTop += (card.getBoundingClientRect().top - beforeTop);
  }));

  cmpDrawAll();
}

// ============================================================
// #9 参数对比：泳道卡片
//   各任务一列卡片横向铺开，纵向按分组展示 key-value；
//   基线固定最左、智能帮比高亮命中任务、可标记最优、可只看差异。
// ============================================================
function findParam(id, group, key){
  const cp = TASKS[id].compareParams || [];
  const g = cp.find(x=> x.group===group); if(!g) return null;
  return g.items.find(x=> x.key===key) || null;
}
// 从含单位的字符串里抽取可比较数值（"2.37s"→2.37、"2.4万"→24000、"5e-6"→5e-6、"8×H800"→8）
function paramNum(v){
  if(v==null) return null;
  const m = String(v).replace(/,/g,'').match(/-?\d+(?:\.\d+)?(?:e-?\d+)?/i);
  if(!m) return null;
  let n = parseFloat(m[0]);
  if(/万/.test(v)) n *= 10000;
  return n;
}
// 某行在所选任务间是否存在差异（缺失计为一种取值）
function rowDiffers(group, key, sel){
  const vals = sel.map(id=>{ const it = findParam(id, group, key); return it ? it.value : '␀'; });
  return new Set(vals).size > 1;
}
// 该行最优任务集合：需 ≥2 个可比数值且并非全部相等，否则视为无优劣不标记
function optimalIds(group, key, better, sel){
  if(!better) return new Set();
  const entries = sel.map(id=>{ const it = findParam(id, group, key); return it ? { id, n: paramNum(it.value) } : null; })
    .filter(x=> x && x.n != null);
  if(entries.length < 2) return new Set();
  if(new Set(entries.map(e=> e.n)).size === 1) return new Set();
  const best = better==='high' ? Math.max(...entries.map(e=>e.n)) : Math.min(...entries.map(e=>e.n));
  return new Set(entries.filter(e=> e.n===best).map(e=> e.id));
}
// 并集出所有分组与各分组下的 key（保持出现顺序），并记录 better 方向
function buildParamModel(sel){
  const groups = [], gmap = new Map();
  sel.forEach(id=> (TASKS[id].compareParams||[]).forEach(g=>{
    let G = gmap.get(g.group);
    if(!G){ G = { group:g.group, keys:[], kset:new Set(), better:new Map() }; gmap.set(g.group, G); groups.push(G); }
    g.items.forEach(it=>{
      if(!G.kset.has(it.key)){ G.kset.add(it.key); G.keys.push(it.key); }
      if(it.better && !G.better.has(it.key)) G.better.set(it.key, it.better);
    });
  }));
  return groups;
}
// 排序：基线置首，其余按拖拽顺序（laneOrder），新加入的接在末尾
function orderedSel(){
  let ids = laneOrder ? laneOrder.filter(id=> compareSel.has(id)) : [...compareSel];
  [...compareSel].forEach(id=>{ if(!ids.includes(id)) ids.push(id); });
  ids = ids.filter(id=> id!==baselineKey);
  if(baselineKey && compareSel.has(baselineKey)) ids.unshift(baselineKey);
  return ids;
}

// 智能帮比：算出命中（胜出）任务
function isPreset(label){ return SMART_PRESETS.some(p=> p.label===label); }
function pickMostOptimal(sel){
  const model = buildParamModel(sel), cnt = {};
  sel.forEach(id=> cnt[id]=0);
  model.forEach(g=> g.keys.forEach(key=>{
    const better = g.better.get(key); if(!better) return;
    optimalIds(g.group, key, better, sel).forEach(id=> cnt[id]++);
  }));
  const mx = Math.max(0, ...sel.map(id=> cnt[id]));
  return mx===0 ? [] : sel.filter(id=> cnt[id]===mx);
}
function applySmart(label){
  smartLabel = label;
  if(!label){ smartPickIds = []; return; }
  const sel = [...compareSel];
  let target = SMART_PRESETS.find(p=> p.label===label);
  if(!target){ const hit = SMART_KW.find(k=> k.re.test(label)); target = hit ? hit.p : null; }
  smartPickIds = target ? [...optimalIds(target.group, target.key, target.dir, sel)] : pickMostOptimal(sel);
}

function laneCardHtml(id, model, sel){
  const t = TASKS[id], isBase = id===baselineKey, picked = smartPickIds.includes(id);
  let rows = model.map(g=>{
    const items = g.keys.map(key=>{
      if(compareDiffOnly && !rowDiffers(g.group, key, sel)) return '';
      const it = findParam(id, g.group, key);
      const val = it ? it.value : '—';
      const better = g.better.get(key);
      const best = markBest && better && optimalIds(g.group, key, better, sel).has(id);
      return `<div class="lane-row" data-rk="${g.group}::${key}">
        <span class="lane-k">${key}</span>
        <span class="lane-v ${best?'best':''}">${best?'<span class="lane-medal">🏅</span>':''}${val}</span>
      </div>`;
    }).filter(Boolean).join('');
    return items ? `<div class="lane-group" data-group="${g.group}"><div class="lane-group-title">${g.group}</div>${items}</div>` : '';
  }).join('');
  if(!rows) rows = `<div class="lane-empty">无差异参数</div>`;
  return `<div class="lane-card ${isBase?'baseline':''} ${picked?'picked':''}" data-id="${id}" ${isBase?'':'draggable="true"'}>
    <div class="lane-head">
      ${isBase?'<span class="lane-pin" title="基线固定最左">📌</span>':'<span class="lane-drag" title="拖拽调整顺序">⠿</span>'}
      <span class="dot ${t.dot}"></span>
      <span class="lane-name" title="${t.name}">${t.name}</span>
      ${isBase?'<span class="lane-base-tag">基线</span>':''}
      ${picked?`<span class="lane-smart-badge">${smartLabel}</span>`:''}
    </div>
    <div class="lane-body">${rows}</div>
  </div>`;
}
// 加号方形按钮 + 下方分组锚点（点击滚动到对应分组，锚点只列当前可见分组）
function laneRailHtml(model, sel){
  const remaining = Object.keys(TASKS).filter(id=> !compareSel.has(id));
  const visGroups = model.filter(g=> g.keys.some(key=> !(compareDiffOnly && !rowDiffers(g.group, key, sel))));
  const anchors = visGroups.map(g=>`<div class="lane-anchor" data-anchor="${g.group}">${g.group}</div>`).join('');
  return `<div class="lane-rail">
    <div class="lane-add ${remaining.length?'':'disabled'}" id="laneAdd" title="${remaining.length?'添加任务列':'已全部加入'}">+
      <div class="lane-add-menu" id="laneAddMenu">
        ${remaining.length
          ? remaining.map(id=>`<div class="lane-add-item" data-add="${id}"><span class="dot ${TASKS[id].dot}"></span>${TASKS[id].name}</div>`).join('')
          : '<div style="padding:8px;color:var(--foreground-muted);font-size:12px">已全部加入</div>'}
      </div>
    </div>
    ${anchors?`<div class="lane-anchors">${anchors}</div>`:''}
  </div>`;
}

function renderParamCompare(){
  if(smartLabel) applySmart(smartLabel);          // 选择集变化后保持命中结果同步
  const right = document.getElementById('cmpTopRight');
  right.innerHTML = `
    <button type="button" class="btn btn-ghost btn-sm${compareDiffOnly?' is-selected':''}" data-toggle="diff">只看差异</button>
    ${markBestSwitchHtml()}`;
  right.querySelector('[data-toggle="diff"]').addEventListener('click', ()=>{
    compareDiffOnly = !compareDiffOnly;
    renderParamCompare();
  });
  bindMarkBestSwitch(right, renderParamCompare);

  const body = document.getElementById('cmpBody');
  const sel = orderedSel();
  if(sel.length===0){ body.innerHTML = `<div class="card cmp-empty">请在左侧勾选至少一个任务</div>`; return; }
  const model = buildParamModel(sel);
  const freeVal = smartLabel && !isPreset(smartLabel) ? smartLabel : '';

  body.innerHTML = `
    <div class="smart-bar">
      <span class="smart-label">✦ 智能帮比</span>
      ${SMART_PRESETS.map(p=>`<button type="button" class="btn btn-ghost btn-sm${smartLabel===p.label?' is-selected':''}" data-preset="${p.label}">${p.label}</button>`).join('')}
      <input class="smart-input" id="smartInput" placeholder="输入你的比较条件，回车评估（如：显存最省 / 速度最快）" value="${freeVal}">
      ${smartLabel?'<span class="smart-clear" id="smartClear">清除</span>':''}
    </div>
    ${smartLabel?`<div class="smart-hint">已按「<b>${smartLabel}</b>」评估：${smartPickIds.length?smartPickIds.map(id=>shortName(id)).join('、')+' 胜出 ✦':'当前所选任务中无可比项'}（Demo）</div>`:''}
    <div class="lane-area">
      <div class="lane-wrap" id="laneWrap">
        ${sel.map(id=> laneCardHtml(id, model, sel)).join('')}
      </div>
      ${laneRailHtml(model, sel)}
    </div>`;

  bindSmart();
  bindLaneDnd();
  bindLaneAdd();
  bindLaneAnchors();
  bindLaneRowHover();
  sizeLaneWrap();
}

// 对比框为独立滚动容器：按可用视口高度限定其高度，框内出现纵向/横向滚动条
function sizeLaneWrap(){
  const wrap = document.getElementById('laneWrap');
  if(!wrap || !document.body.contains(wrap)) return;
  const top = wrap.getBoundingClientRect().top;   // 框顶距视口顶的距离
  wrap.style.maxHeight = Math.max(240, window.innerHeight - top - 16) + 'px';
}
if(typeof _laneResize === 'undefined') var _laneResize = null;
if(!_laneResize){ _laneResize = ()=> sizeLaneWrap(); window.addEventListener('resize', _laneResize, { passive: true }); }

// 点击分组锚点：在对比框内滚动，把对应分组标题滚到悬浮任务标题正下方（锚点在框外的控制列里）
function headHeight(wrap){ const h = wrap.querySelector('.lane-head'); return h ? h.getBoundingClientRect().height : 46; }
function laneAnchors(wrap){ const area = wrap.closest('.lane-area'); return area ? [...area.querySelectorAll('.lane-anchor')] : []; }
function bindLaneAnchors(){
  const wrap = document.getElementById('laneWrap');
  if(!wrap) return;
  laneAnchors(wrap).forEach(a=> a.addEventListener('click', ()=>{
    const g = wrap.querySelector(`.lane-group[data-group="${CSS.escape(a.dataset.anchor)}"]`);
    if(!g) return;
    const top = wrap.scrollTop + g.getBoundingClientRect().top - wrap.getBoundingClientRect().top - headHeight(wrap) - 6;
    wrap.scrollTo({ top, behavior: 'smooth' });
  }));
  _anchorSpy = ()=> updateAnchorSpy();
  wrap.addEventListener('scroll', _anchorSpy, { passive: true });
  updateAnchorSpy();
}
// 滚动联动：高亮当前悬浮在任务标题下方的那个分组对应的锚点
let _anchorSpy = null;
function updateAnchorSpy(){
  const wrap = document.getElementById('laneWrap');
  if(!wrap || !document.body.contains(wrap)) return;
  const anchors = laneAnchors(wrap);
  if(!anchors.length) return;
  const band = wrap.getBoundingClientRect().top + headHeight(wrap) + 8;   // 悬浮标题正下方一线
  let active = anchors[0].dataset.anchor;
  anchors.forEach(a=>{
    const g = wrap.querySelector(`.lane-group[data-group="${CSS.escape(a.dataset.anchor)}"]`);
    if(g && g.getBoundingClientRect().top <= band) active = a.dataset.anchor;
  });
  // 触底时无法把末尾分组顶到悬浮线，直接高亮最后一个分组
  if(wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 2)
    active = anchors[anchors.length-1].dataset.anchor;
  anchors.forEach(a=> a.classList.toggle('is-selected', a.dataset.anchor===active));
}

// 悬浮某参数行时，联动高亮所有泳道中同一参数（group::key）的对应行
function bindLaneRowHover(){
  const wrap = document.getElementById('laneWrap');
  if(!wrap) return;
  wrap.querySelectorAll('.lane-row[data-rk]').forEach(row=>{
    const rk = row.dataset.rk;
    const peers = wrap.querySelectorAll(`.lane-row[data-rk="${CSS.escape(rk)}"]`);
    row.addEventListener('mouseenter', ()=> peers.forEach(p=> p.classList.add('row-hi')));
    row.addEventListener('mouseleave', ()=> peers.forEach(p=> p.classList.remove('row-hi')));
  });
}

function bindSmart(){
  document.querySelectorAll('[data-preset]').forEach(c=> c.addEventListener('click', ()=>{
    const label = c.dataset.preset;
    applySmart(smartLabel===label ? '' : label);   // 再次点击取消
    renderParamCompare();
  }));
  const input = document.getElementById('smartInput');
  if(input) input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ const v = input.value.trim(); applySmart(v); renderParamCompare(); }
  });
  const clr = document.getElementById('smartClear');
  if(clr) clr.addEventListener('click', ()=>{ applySmart(''); renderParamCompare(); });
}
function bindLaneDnd(){
  const wrap = document.getElementById('laneWrap');
  wrap.querySelectorAll('.lane-card[draggable="true"]').forEach(card=>{
    card.addEventListener('dragstart', ()=>{ dragId = card.dataset.id; card.style.opacity = '.4'; });
    card.addEventListener('dragend',   ()=>{ card.style.opacity = ''; });
    card.addEventListener('dragover',  e=>{ e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', ()=> card.classList.remove('drag-over'));
    card.addEventListener('drop', e=>{
      e.preventDefault(); card.classList.remove('drag-over');
      const targetId = card.dataset.id;
      if(!dragId || dragId===targetId || targetId===baselineKey){ dragId = null; return; }
      let order = orderedSel().filter(id=> id!==baselineKey && id!==dragId);
      order.splice(order.indexOf(targetId), 0, dragId);
      laneOrder = baselineKey ? [baselineKey, ...order] : order;
      dragId = null;
      renderParamCompare();
    });
  });
}
function bindLaneAdd(){
  const add = document.getElementById('laneAdd'); if(!add || add.classList.contains('disabled')) return;
  const menu = document.getElementById('laneAddMenu');
  add.addEventListener('click', e=>{ e.stopPropagation(); menu.classList.toggle('open'); });
  menu.addEventListener('click', e=> e.stopPropagation());
  menu.querySelectorAll('.lane-add-item').forEach(it=> it.addEventListener('click', ()=>{
    compareSel.add(it.dataset.add); laneOrder = null;
    renderCompareSidebar(); renderParamCompare();
  }));
  document.addEventListener('click', ()=> menu.classList.remove('open'), { once:true });
}

function cmpDrawAll(){
  cmpCharts = [];
  document.querySelectorAll('.cmp-chart-area').forEach(area=>{
    if(area.offsetParent === null) return;   // 折叠分区内的图已隐藏，跳过（展开时会再重绘）
    cmpChart(area, CMP_METRICS[+area.dataset.mi]);
  });
}

function cmpChart(area, m){
  const sel = [...compareSel].filter(id=> cmpSeries(id, m));
  const cmpCard = area.closest('.card');
  const isExpanded = !!(cmpCard && cmpCard.classList.contains('is-expanded'));
  const w = area.clientWidth || 300, h = isExpanded ? 180 : 120, pad = 12;
  const datas = sel.map(id=>({ id, color:dotColor(id), vals:cmpSeriesEnriched(id, m),
    name:TASKS[id].name, base:id===baselineKey }));
  const allV = datas.flatMap(d=> d.vals);
  const min = Math.min(...allV), max = Math.max(...allV), rng = (max-min)||1;
  const n = Math.max(...datas.map(d=> d.vals.length));
  const X = i => pad + i*(w-pad*2)/(n-1);
  const Y = v => pad + (h-pad*2)*(1-(v-min)/rng);
  const pathOf = vals => vals.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const sm = cmpSmooth>0;
  datas.forEach(d=> d.svals = sm ? smoothEMA(d.vals, cmpSmooth) : null);
  // 非基线先画、基线后画（置于顶层，加粗）；颜色统一用任务本色，与侧栏图例保持一致——
  // 之前基线曾强制显示为灰色 #888，和侧栏 .dot 的本色不一致，需要取消/重设基线才会「变回」本色，
  // 现改为始终用本色，仅靠线宽/z-order/「基线」标签区分基线。
  const ordered = [...datas.filter(d=>!d.base), ...datas.filter(d=>d.base)];
  // 平滑开启时：原始曲线弱化（细、低透明），叠加显示平滑后曲线
  const lines = ordered.map(d=>{
    const col = d.color;
    const raw = `<path d="${pathOf(d.vals)}" fill="none" stroke="${col}"
       stroke-width="1" stroke-linejoin="round" stroke-linecap="round"
       opacity="${sm?0.28:(d.base?0.95:0.85)}"/>`;
    const smooth = sm ? `<path d="${pathOf(d.svals)}" fill="none" stroke="${col}"
       stroke-width="1" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>` : '';
    return raw + smooth;
  }).join('');
  // 横向参考网格线：与 fillYAxis 的 max/mid/min 三档刻度对齐，参考 training-monitoring-v2
  // 精度栏 PtoTrainingMetricsChart 的 .pto-tmchart__grid（同色同宽），置于折线下层
  const gridY = [pad, pad+(h-pad*2)/2, h-pad];
  const grid = gridY.map(y=> `<line x1="0" y1="${y.toFixed(1)}" x2="${w}" y2="${y.toFixed(1)}"
    stroke="var(--border-subtle)" stroke-width="1"/>`).join('');
  area.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${grid}
    ${lines}
    <line class="cmp-vline" x1="0" y1="${pad}" x2="0" y2="${h-pad}"
      stroke="rgba(33,33,33,.32)" stroke-width="1" stroke-dasharray="3 3" style="display:none"/>
    <g class="cmp-dots"></g>
  </svg><div class="cmp-chart-tip"></div>`;
  const svg = area.querySelector('svg');
  const chartStepMax = Math.max(...datas.map(d => parseInt(TASKS[d.id].runtime && TASKS[d.id].runtime.stepCur) || d.vals.length));
  const obj = { area, m, datas, n, w, X, Y, stepMax: chartStepMax,
    vline: svg.querySelector('.cmp-vline'), dots: svg.querySelector('.cmp-dots'),
    tip: area.querySelector('.cmp-chart-tip') };
  cmpCharts.push(obj);
  // 填充纵坐标
  const _row = area.closest('.km-chart-row');
  const _yaxEl = _row && _row.querySelector('.km-yaxis');
  fillYAxis(_yaxEl, min, max, false);
  // 填充 step 横坐标刻度（km-axis 是 km-chart-row 的下一个兄弟）
  const axEl = _row ? _row.nextElementSibling : area.nextElementSibling;
  if(axEl && axEl.classList.contains('km-axis')){
    const ticks = 4;
    axEl.innerHTML = Array.from({length:ticks+1},(_,j)=>
      `<span>${Math.round(chartStepMax*j/ticks)}</span>`).join('');
  }
  // 在任意一张图上移动，都联动刷新所有图（竖线 + 数据点 + 各自气泡）
  area.addEventListener('mousemove', e=>{
    const rect = area.getBoundingClientRect();
    const px = (e.clientX-rect.left)/rect.width*w;
    let idx = Math.round((px-pad)/((w-pad*2)/(n-1)));
    idx = Math.max(0, Math.min(n-1, idx));
    cmpSyncAll(idx, area, e.clientX);
  });
  area.addEventListener('mouseleave', cmpHideAll);
}

// 联动：所有对比图在同一 idx 处画竖线、标记数据点，并各自弹出信息气泡
// hoverArea/clientX：实际触发 mousemove 的那张图与鼠标视口坐标，用于让该图的气泡贴着鼠标走
function cmpSyncAll(idx, hoverArea, clientX){
  cmpCharts.forEach(c=>{
    const x = c.X(idx).toFixed(1);
    c.vline.setAttribute('x1', x); c.vline.setAttribute('x2', x);
    c.vline.style.display = '';
    c.dots.innerHTML = c.datas.map(d=> idx>=d.vals.length ? '' :
      `<circle cx="${c.X(idx).toFixed(1)}" cy="${c.Y((d.svals||d.vals)[idx]).toFixed(1)}"
        r="${d.base?3.2:2.6}" fill="${d.color}" stroke="#fff" stroke-width="1"/>`).join('');
    cmpFillTip(c, idx, hoverArea, clientX);
  });
}
function cmpHideAll(){
  cmpCharts.forEach(c=>{ c.vline.style.display='none'; c.dots.innerHTML=''; c.tip.style.display='none'; });
}
// 单张图的信息气泡：列出各任务在 idx 处取值及相对基线偏差，定位在竖线一侧
function cmpFillTip(c, idx, hoverArea, clientX){
  const base = c.datas.find(d=> d.base);
  c.tip.innerHTML = `<div class="cmp-tip-head">step ${Math.round(idx/(c.n-1)*c.stepMax)}</div>` +
    c.datas.map(d=>{
      const v = (d.svals||d.vals)[idx];
      // 差异列固定渲染（基线行本身留空），保证数值列/差异列在各行右对齐、不随有无差异跳动宽度
      let dev = '<span class="cmp-tip-dev"></span>';
      if(base && d!==base){
        const dv = deviation(v, (base.svals||base.vals)[idx], c.m.dir);
        const sign = dv.pct>=0 ? '+' : '';
        dev = `<span class="cmp-tip-dev" style="color:${dv.bad?'var(--danger)':'var(--foreground-muted)'}">${sign}${(dv.pct*100).toFixed(0)}%</span>`;
      }
      return `<div class="cmp-tip-row">
        <span class="cmp-tip-dot" style="background:${d.color}"></span>
        <span class="cmp-tip-name">${shortName(d.id)}${d.base?'·基线':''}</span>
        <span class="cmp-tip-val">${fmtNum(v)}</span>${dev}</div>`;
    }).join('');
  c.tip.style.display = 'block';
  // 气泡不再钳制在自身图表容器宽度内（图很窄时会被自己整片盖住）：
  // 正在悬浮的这张图直接贴着鼠标真实横坐标走；联动的其它图仍按数据点位置跟随，
  // 两者都只以浏览器视口边缘做兜底限位，允许气泡越出所在卡片/网格单元
  const rect = c.area.getBoundingClientRect();
  const tw = c.tip.offsetWidth;
  const cursorLocalX = (c.area === hoverArea && typeof clientX === 'number')
    ? clientX - rect.left
    : (c.X(idx)/c.w) * rect.width;
  const gap = 10;
  let left = cursorLocalX + gap;
  if(rect.left + left + tw > window.innerWidth - 4){
    left = cursorLocalX - tw - gap;
  }
  left = Math.max(4 - rect.left, Math.min(left, window.innerWidth - 4 - rect.left - tw));
  c.tip.style.left = left + 'px';
  c.tip.style.top = '4px';
}
enterCompare();
applyTheme(currentTheme);   // 初始主题图标/属性状态（本页无整网图渲染，等价于原 {skipRender:true}）
window.addEventListener('resize', function(){ renderCompare(); });

</script>
