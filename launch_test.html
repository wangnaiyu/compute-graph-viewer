.launch-shell {

.launch-card-shell {

.hero-action-link {

.card-title {

.card-subtitle {

  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-preview {

.card-preview img,

.card-actions {

}

.btn::before {
  content: "";

  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}

.btn::before {

.btn-solid {

}

  .launch-hero {
    grid-template-columns: minmax(0, 1fr) auto;

@media (max-width: 720px) {

    max-width: 100%;

  .launch-app {
    background-attachment: scroll;

  .launch-hero {
    padding: var(--space-4);
  }

  .card-grid {
    grid-template-columns: 1fr;
  }

  .launch-card {
    width: 100%;
    height: 100%;
  }
}

@media (prefers-reduced-motion: reduce) {
  .launch-app::after {
    animation: none;
  }

}

@keyframes waveLift {
  from {
    transform: translate3d(-1.5%, 2%, 0) scaleX(1.08);

  }

  to {
    transform: translate3d(1.5%, -2%, 0) scaleX(1.14);
    border-radius: 54% 46% 0 0 / 42% 54% 0 0;
  }
}
</style>

function totalCount(groups = GROUPS) {
  return groups.reduce((sum, group) => sum + group.items.length, 0);
}

function classNames(...parts) {
  return parts.filter(Boolean).join(" ");
}

function sameRect(a, b) {
  return !!a &&
    a.left === b.left &&
    a.top === b.top &&
    a.width === b.width &&
    a.height === b.height &&
    a.viewportW === b.viewportW &&
    a.viewportH === b.viewportH;
}

function useViewportRect(enabled) {
  const ref = useRef(null);
  const [rect, setRect] = useState(null);

  useLayoutEffect(() => {
    const el = ref.current;
    if (!el || !enabled) {
      setRect(null);
      return undefined;
    }

    let frame = 0;
    const measure = () => {
      cancelAnimationFrame(frame);
      frame = requestAnimationFrame(() => {
        const box = el.getBoundingClientRect();
        const next = {
          left: Math.round(box.left),
          top: Math.round(box.top),
          width: Math.round(box.width),
          height: Math.round(box.height),
          viewportW: window.innerWidth,
          viewportH: window.innerHeight,
        };
        setRect((prev) => sameRect(prev, next) ? prev : next);
      });
    };

    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener("resize", measure);
    window.addEventListener("scroll", measure, { passive: true });

    return () => {
      cancelAnimationFrame(frame);
      ro.disconnect();
      window.removeEventListener("resize", measure);
      window.removeEventListener("scroll", measure);
    };
  }, [enabled]);

  return [ref, rect];
}

function RefractBackdrop({ rect }) {
  return h("div", {
    "aria-hidden": "true",
    style: {
      position: "absolute",
      left: -rect.left,
      top: -rect.top,
      width: rect.viewportW,
      height: rect.viewportH,
      background: PAGE_REFRACT_BACKGROUND,
      backgroundAttachment: "fixed",
      backgroundPosition: "center top",
      backgroundSize: "cover",
    },
  });
}

function Preview({ preview, title }) {
  if (!preview) {
    return h("div", { className: "preview-placeholder" }, "No preview");
  }

  if (preview.type === "iframe") {
    return h("iframe", {
      src: preview.src,
      scrolling: "no",
      tabIndex: "-1",
      title: `${title} 预览`,
    });
  }

  return h("img", {
    className: classNames(preview.contain && "is-contain", preview.scaled && "is-scaled"),
    src: preview.src,
    alt: `${title} 静态预览`,
    loading: "lazy",
    decoding: "async",
  });
}

function ActionLink({ action }) {
  return h("a", {
    className: classNames("btn", action.primary ? "btn-solid" : "btn-compact"),
    href: action.href,
    target: action.target || undefined,
    rel: action.target === "_blank" ? "noreferrer" : undefined,
  }, action.label);
}

function LaunchCard({ item }) {
  const actions = item.actions || [];
  const isSingle = !actions.length && item.href;
  const subtitle = ITEM_SUBTITLES[item.title] || "项目入口与相关版本快速打开。";
  const [isLensActive, setIsLensActive] = useState(false);
  const [cardRef, rect] = useViewportRect(isLensActive);
  const content = [
    h("div", { className: "card-head", key: "head" },
      h("div", { className: "card-title-row" },
        h("h3", { className: "card-title" }, item.title),
      ),
      h("p", { className: "card-subtitle" }, subtitle),
    ),
    h("div", { className: "card-preview", key: "preview" },
      h(Preview, { preview: item.preview, title: item.title }),
      isSingle
        ? h("a", {
            className: "card-open",
            href: item.href,
            target: item.target || undefined,
            rel: item.target === "_blank" ? "noreferrer" : undefined,
            "aria-label": `打开 ${item.title}`,
          })
        : h("div", { className: "card-actions", "aria-label": `${item.title} 操作` },
            h("div", { className: "card-action-row" },
              actions.map((action) => h(ActionLink, {
                key: `${item.title}-${action.href}`,
                action,
              })),
            ),
          ),
    ),
  ];

  return h("div", {
    className: "launch-card-shell",
    ref: cardRef,
    onMouseEnter: () => setIsLensActive(true),
    onMouseLeave: () => setIsLensActive(false),
    onFocusCapture: () => setIsLensActive(true),
    onBlurCapture: (event) => {
      if (!event.currentTarget.contains(event.relatedTarget)) {
        setIsLensActive(false);
      }
    },
  },
    rect && h(Glass, {
          className: "launch-card-lens",
          style: CARD_GLASS_STYLE,
          optics: CARD_GLASS_OPTICS,
          width: rect.width,
          height: rect.height,
          radius: CARD_GLASS_RADIUS,
          brightnessInFilter: true,
          refract: h(RefractBackdrop, { rect }),
          behind: "#07080b",
        }),
    h("article", { className: "launch-card" }, content),
  );
}

  );
}
